name: CI
on:
  push:
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pyshp
      - name: Invariant checks (regenerate from source/, no forked datasets, build)
        run: python3 test/check.py

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          # PINNED, not "stable". The golden images exist to catch OUR changes, and a
          # moving browser silently invalidates them: the runner drifted 150.0.7871.128 ->
          # .181 mid-week and tree-desktop shifted 13px with it. Bump this deliberately,
          # then re-bless both baseline sets in the same commit.
          chrome-version: 150.0.7871.181
      # Deps live in test/package.json (puppeteer-core + pixelmatch + pngjs) and
      # smoke.mjs resolves them from test/node_modules. Installing puppeteer at the
      # repo root left pixelmatch/pngjs unresolvable and pinned a different browser
      # version than the one the golden images were blessed on.
      - run: npm ci --prefix test
      - name: Visual smoke (golden-image diff + console/count assertions, every view)
        env:
          CHROME: ${{ steps.chrome.outputs.chrome-path }}
        run: node test/smoke.mjs
