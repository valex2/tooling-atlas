<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tooling Cards — Atlas</title>
<style>
:root{--ink:#1c1c1c;--mut:#6f6f6f;--line:rgba(0,0,0,.12);--bg:#f5f3ef;--card:#fff;
--Measure:#3266ad;--Model:#8a4fb3;--Make:#b06a1e;--Manufacture:#2f8f6b;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
.top{padding:14px 18px 6px;}
h1{font-size:20px;font-weight:600;margin:0 0 6px;}
.bar{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;margin:5px 0;}
.grp{display:flex;gap:4px;align-items:center;}
.grp .lab{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin-right:3px;}
.btn{border:.5px solid var(--line);background:#fff;border-radius:13px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--ink);white-space:nowrap;}
.btn:hover{background:#eceae4}.btn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
input.search{border:.5px solid var(--line);border-radius:13px;padding:4px 10px;font-size:12px;width:130px;background:#fff;color:var(--ink);}
input[type=range]{accent-color:var(--ink);width:90px;}
.legend{display:flex;gap:11px;flex-wrap:wrap;font-size:11px;color:var(--mut);margin-top:3px;}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin-right:4px;}
.threadbar{display:flex;flex-wrap:wrap;gap:4px;margin:5px 0 0;max-height:50px;overflow:auto;}
.tchip{border:.5px solid var(--line);background:#fff;border-radius:11px;padding:2px 8px;font-size:10.5px;cursor:pointer;color:var(--mut);}
.tchip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
/*dragpan*/
.scroll{cursor:grab;overflow:auto;border-top:.5px solid var(--line);height:calc(100vh - 150px);background:#fcfbf9;}
#zoomwrap{position:relative;}
#stage{position:relative;transform-origin:0 0;}
#edges{position:absolute;left:0;top:0;pointer-events:none;z-index:1;}
.lanelab{position:absolute;left:6px;font-size:10.5px;color:var(--mut);font-weight:500;transform:translateY(-50%);width:150px;z-index:3;cursor:pointer;}
.lanelab:hover{color:var(--ink);text-decoration:underline;}
.lanelab .car{color:#c0bdb6;font-size:9px;}
.lanesep{position:absolute;left:0;border-top:.5px dashed rgba(0,0,0,.06);z-index:0;}
.yr{position:absolute;font-size:9.5px;}
.gl{position:absolute;border-left:1px solid rgba(0,0,0,.045);}
.gl.maj{border-left:1px solid rgba(0,0,0,.10);}
.dot{position:absolute;border-radius:50%;z-index:2;cursor:pointer;border:1px solid #fff;}
.c{position:absolute;background:var(--card);border:.5px solid var(--line);border-left:4px solid #999;border-radius:8px;padding:6px 9px;cursor:pointer;z-index:2;overflow:hidden;}
.c:hover{box-shadow:0 5px 16px rgba(0,0,0,.14);z-index:6;}
.c .ti{font-size:11.5px;font-weight:500;line-height:1.2;}
.c .pe{font-size:9.5px;color:var(--mut);margin-top:2px;line-height:1.15;}
.c .kx{font-size:9px;color:#aaa;margin-top:2px;}
.c .sg{font-size:10px;line-height:1.35;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.c.full .sg{-webkit-line-clamp:6;}
.dim{opacity:.12 !important;}
.sel{outline:2.5px solid var(--ink);outline-offset:1px;}
.hl{outline:2px solid var(--ink);outline-offset:1px;}
#fc{position:absolute;width:240px;background:var(--card);border:.5px solid var(--line);border-left:4px solid #999;border-radius:9px;padding:10px 12px;box-shadow:0 10px 34px rgba(0,0,0,.2);z-index:30;display:none;pointer-events:none;}
#fc .ti{font-size:13px;font-weight:600;}#fc .me{font-size:10.5px;color:var(--mut);margin-top:2px;}
#fc .sg{font-size:11px;margin-top:7px;line-height:1.45;}#fc .rel{font-size:10px;color:var(--mut);margin-top:7px;line-height:1.4;}
#fc .tg{font-size:9.5px;background:#f0ede7;color:#555;border-radius:8px;padding:1px 6px;margin:2px 3px 0 0;display:inline-block;}
.hint{font-size:11px;color:#b9b4ab;padding:5px 18px;}
.ylab{font-weight:600;font-size:15px;min-width:48px;}
#mtip{position:fixed;pointer-events:none;background:var(--card);border:.5px solid var(--line);border-left:4px solid #999;border-radius:8px;padding:8px 10px;font-size:12px;max-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.16);display:none;z-index:60;}
.maplbl{position:absolute;transform:translate(-50%,-100%);font-size:10px;font-weight:600;color:var(--ink);white-space:nowrap;pointer-events:none;text-shadow:0 1px 2px #fcfbf9,0 -1px 2px #fcfbf9,1px 0 2px #fcfbf9,-1px 0 2px #fcfbf9;}
#stage .lanelab{background:rgba(252,251,249,.93);z-index:7;padding:1px 6px 1px 3px;border-radius:0 5px 5px 0}
</style>
</head><body>

<script>
const DATA=[{"id": "AI Drug Discovery", "name": "AI Drug Discovery", "kind": "Model", "year": 2019, "place": "London, United Kingdom", "person": "Isomorphic Labs / Insilico Medicine", "sig": "A model that invents new molecules to fit a target turns drug discovery from a search into a design problem.", "threads": ["Therapeutics", "Machine Learning"], "primary": "Therapeutics", "lat": 51.5074, "lon": -0.1278, "bo": ["AlphaFold", "The Deep-Learning Framework"], "en": []}, {"id": "Abbe's Diffraction Limit", "name": "Abbe's Diffraction Limit", "kind": "Model", "year": 1873, "place": "Jena, Germany", "person": "Ernst Abbe", "sig": "Abbe's formula turned lens design from guesswork into calculation, making Jena the center of world optics for generations and drawing the exact wall that forced the jump to electron microscopes.", "threads": ["Precision Optics", "Microscopy"], "primary": "Precision Optics", "lat": 50.93, "lon": 11.59, "bo": ["Leeuwenhoek's Microscope", "Fraunhofer's Spectral-Line Glass"], "en": ["The Matter Wave", "Photolithography", "The Foldscope"]}, {"id": "AlexNet", "name": "AlexNet", "kind": "Make", "year": 2012, "place": "Toronto, Canada", "person": "Krizhevsky, Sutskever, and Hinton", "sig": "AlexNet cut image-recognition error by 10 points over the field in 2012, proving that deep networks on consumer GPUs worked at scale and triggering nearly every serious lab to switch methods within a year.", "threads": ["Machine Learning"], "primary": "Machine Learning", "lat": 43.65, "lon": -79.38, "bo": ["ImageNet"], "en": ["The Transformer"]}, {"id": "AlphaFold", "name": "AlphaFold", "kind": "Model", "year": 2020, "place": "London, England", "person": "Demis Hassabis and John Jumper", "sig": "AlphaFold replaced months of X-ray crystallography with hours of computation, putting the shapes of 200 million proteins online for free and moving the lead in structural biology to whoever can train the model.", "threads": ["Reading & Writing DNA", "Predict Before Building"], "primary": "Reading & Writing DNA", "lat": 51.51, "lon": -0.13, "bo": ["X-ray Crystallography", "Computational Fluid Dynamics", "Cryo-EM", "CRISPR-Cas9", "The Deep-Learning Framework", "The Transformer"], "en": ["AI Drug Discovery"]}, {"id": "Antibiotic Fermentation", "name": "Antibiotic Fermentation", "kind": "Manufacture", "year": 2004, "place": "Shijiazhuang, China", "person": "North China Pharmaceutical and the Chinese fermentation plants", "sig": "Industrial antibiotic fermentation grows the 6-APA and 7-ACA core that nearly all penicillins and cephalosporins are built from, and the West let the tool migrate to China so completely that the last US penicillin plant closed in 2004.", "threads": ["Therapeutics"], "primary": "Therapeutics", "lat": 38.04, "lon": 114.51, "bo": ["Deep-Tank Fermentation"], "en": []}, {"id": "Atomic Layer Deposition", "name": "Atomic Layer Deposition", "kind": "Manufacture", "year": 1974, "place": "Helsinki, Finland", "person": "Tuomo Suntola", "sig": "Atomic layer deposition grows a film one atomic layer at a time using gas reactions that stop themselves once a single layer is laid, the only way to coat the most advanced chips with the exact thinness they need.", "threads": ["Chip Lithography"], "primary": "Chip Lithography", "lat": 60.17, "lon": 24.94, "bo": ["The Integrated Circuit"], "en": ["The Wafer Stepper"]}, {"id": "Backpropagation", "name": "Backpropagation", "kind": "Model", "year": 1986, "place": "San Diego, California, USA", "person": "Rumelhart, Hinton, and Williams", "sig": "Backpropagation gave neural networks a way to learn their own features from examples rather than hand-coded rules, but the method sat idle for 25 years until cheap GPUs made it practical, so the lead pooled in compute, not the equation.", "threads": ["Machine Learning"], "primary": "Machine Learning", "lat": 32.72, "lon": -117.16, "bo": [], "en": ["The GPU"]}, {"id": "Battery-Line Equipment", "name": "Battery-Line Equipment", "kind": "Manufacture", AlphaFold"]}, {"id": "Cryo-EM", "name": "Cryo-EM", "kind": "Measure", "year": 1984, "place": "Heidelberg, Germany", "person": "Jacques Dubochet, Joachim Frank, Richard Henderson", "sig": "Cryo-EM flash-freezes a molecule in glassy ice and rebuilds its shape from thousands of electron-microscope images, solving structures too big or too floppy to crystallize, the modern rival to X-ray crystallography.", "threads": ["Materials Characterization", "Electron Microscopy"], "primary": "Materials Characterization", "lat": 49.4, "lon": 8.67, "bo": ["The Electron Microscope", "The Scanning Tunneling Microscope"], "en": ["AlphaFold"]}, {"id": "DNA Sequencing", "name": "DNA Sequencing", "kind": "Measure", "year": 1977, "place": "Cambridge, England", "person": "Frederick Sanger", "sig": "Sanger's 1977 method made it possible to read the order of DNA letters for the first time, opening a four-decade cost collapse that moved the sequencing lead from Cambridge to San Diego's Illumina and now into contest with China's BGI.", "threads": ["Reading & Writing DNA"], "primary": "Reading & Writing DNA", "lat": 52.2, "lon": 0.12, "bo": ["The Laser", "Gel Electrophoresis", "Recombinant DNA"], "en": ["Next-Generation Sequencing", "PCR"]}, {"id": "DNA Synthesis", "name": "DNA Synthesis", "kind": "Make", "year": 1981, "place": "Boulder, Colorado, USA", "person": "Marvin Caruthers", "sig": "Caruthers' phosphoramidite chemistry let a machine write a chosen DNA sequence one base at a time in hours, the write half of biology that pairs with reading it.", "threads": ["Reading & Writing DNA", "Engineering Biology"], "primary": "Reading & Writing DNA", "lat": 40.01, "lon": -105.27, "bo": ["Monoclonal Antibodies"], "en": ["DNA-Encoded Libraries", "PCR", "CRISPR-Cas9"]}, {"id": "DNA-Encoded Libraries", "name": "DNA-Encoded Libraries", "kind": "Make", "year": 1992, "place": "La Jolla, USA", "person": "Sydney Brenner and Richard Lerner", "sig": "It turns drug screening from a one-at-a-time grind into a single pooled experiment read out by sequencing.", "threads": ["Therapeutics"], "primary": "Therapeutics", "lat": 32.8328, "lon": -117.2713, "bo": ["DNA Synthesis", "Next-Generation Sequencing"], "en": ["High-Throughput Screening"]}, {"id": "DRAM", "name": "DRAM", "kind": "Make", "year": 1966, "place": "Yorktown Heights, New York, USA", "person": "Robert Dennard", "sig": "DRAM stores each bit as a speck of charge held by one tiny transistor, the cheap memory in every computer, and the commodity whose manufacturing lead slid from America to Japan to Korea.", "threads": ["Electronic Switching"], "primary": "Electronic Switching", "lat": 41.27, "lon": -73.77, "bo": ["The MOSFET"], "en": []}, {"id": "Deep-Tank Fermentation", "name": "Deep-Tank Fermentation", "kind": "Manufacture", "year": 1944, "place": "Peoria, Illinois, USA", "person": "Andrew Moyer and the Peoria lab", "sig": "Submerged deep-tank fermentation is the tool that turned penicillin from a milligram-a-week lab curiosity into the first mass-produced antibiotic, and it moved drug-making leadership from Britain to America.", "threads": ["Therapeutics", "Forced by War"], "primary": "Therapeutics", "lat": 40.69, "lon": -89.59, "bo": [], "en": ["Antibiotic Fermentation", "The Single-Use Bioreactor"]}, {"id": "Density Functional Theory", "name": "Density Functional Theory", "kind": "Model", "year": 1965, "place": "San Diego, California, USA", "person": "Walter Kohn", "sig": "Density functional theory made it possible to calculate a material's properties from the quantum behavior of its electrons, turning materials science from wet-lab trial and error into something you can compute.", "threads": ["Predict Before Building"], "primary": "Predict Before Building", "lat": 32.72, "lon": -117.16, "bo": [], "en": ["GNoME"]}, {"id": "Einstein's Displacement Equation", "name": "Einstein's Displacement Equation", "kind": "Model", "year": 1905, "place": "Bern, Switzerland", "person": "Albert Einstein", "sig": "Einstein's 1905 equation tied the distance a suspended speck wanders to the number of atoms in matter, turning a microscope and a stopwatch into an atom-counting instrument, though the formula was free and gave no one a lasting lead.", "threads": ["Atomic Theory"], "primary": "Atomic Theory", "lat": 46.95, "lon": 7.45, "bo": ["Leeuwenhoek's Microscope", "The Spectroscope"], "en": ["The Mass Spectrograph"]}, {"id": "Electronic Design Automation", "name": "Electronic Design Automation", "kind": "Model", "year": 1980, "place": "Pasadena, California, USA", "person": "Carver Mead and Lynn Conway", "sig": "Turning chip design into software split designing a chip from making it, creating the fabless-and-foundry model, and the design tools settled into three American firms that still hold most of the market.", "threads": ["Prototyping & CAD", "Chip Lithography"], "primary": "Prototyping & CAD", "lat": 34.15, "lon": -118.14, "bo": ["The Integrated Circuit", "Sketchpad"], "en": ["The High-Yield Process Recipe"]}, {"id": "Ethernet", "name": "Ethernet", "kind": "Make", "year": 1973, "place": "Palo Alto, USA", "person": "Robert Metcalfe and David Boggs", "sig": "It let a room full of computers share one cable by taking turns, and became the way local networks were wired.", "threads": ["The Network"], "primary": "The Network", "lat": 37.4, "lon": -122.15, "bo": ["The Router"], "en": ["TCP-IP"]}, {"id": "FORTRAN", "name": "FORTRAN", "kind": "Model", "year": 1957, "place": "New York, New York, USA", "person": "John Backus", "sig": "FORTRAN's optimizing compiler proved a program written in plain math could run nearly as fast as hand-tuned machine code, so software finally split from the one machine it was written for.", "threads": ["Software Abstraction"], "primary": "Software Abstraction", "lat": 40.71, "lon": -74.01, "bo": ["The Punch Card"], "en": ["Unix and C", "Smalltalk"]}, {"id": "Faraday's Induction Ring", "name": "Faraday's Induction Ring", "kind": "Make", "year": 1831, "place": "London, rced by War"], "primary": "Reaching Orbit", "lat": 45.96, "lon": 63.31, "bo": ["The V-2"], "en": ["Project Echo", "The F-1 Engine"]}, {"id": "The Relational Model", "name": "The Relational Model", "kind": "Model", "year": 1970, "place": "San Jose, California, USA", "person": "Edgar Codd", "sig": "Codd's relational model stored data as plain tables you could question by logic instead of by knowing where each record physically sat, the idea under almost every database since.", "threads": ["Software Abstraction"], "primary": "Software Abstraction", "lat": 37.34, "lon": -121.89, "bo": ["The Punch Card"], "en": []}, {"id": "The Router", "name": "The Router", "kind": "Make", "year": 1969, "place": "Cambridge, Massachusetts, USA", "person": "Frank Heart and the BBN team", "sig": "The IMP was a dedicated box that took in packets and forwarded each toward its destination, the first node of the ARPANET and the ancestor of every internet router.", "threads": ["The Network"], "primary": "The Network", "lat": 42.39, "lon": -71.14, "bo": ["Packet Switching"], "en": ["Ethernet", "TCP-IP"]}, {"id": "The Scaled-Up Language Model", "name": "The Scaled-Up Language Model", "kind": "Make", "year": 2020, "place": "San Francisco, California, USA", "person": "OpenAI", "sig": "Growing a Transformer to internet scale and then tuning it to follow plain instructions made a single model that does many tasks, but its published recipe meant the durable lead settled not in the model but in the chips and fabs that train and run it.", "threads": ["Machine Learning"], "primary": "Machine Learning", "lat": 37.77, "lon": -122.42, "bo": ["TCP-IP", "The Deep-Learning Framework", "The Transformer"], "en": []}, {"id": "The Scanning Tunneling Microscope", "name": "The Scanning Tunneling Microscope", "kind": "Measure", "year": 1981, "place": "Zurich, Switzerland", "person": "Gerd Binnig and Heinrich Rohrer", "sig": "The scanning tunneling microscope drags a needle one atom wide across a surface and feels eac (function(){const sc=document.getElementById("scroll");let dn=false,sx,sy,sl,st;window.__dragpan=1;
 sc.addEventListener("mousedown",e=>{if(e.target.closest(".c,.dot,.mdot,.lanelab,a,button,input,.tchip"))return;dn=true;sx=e.clientX;sy=e.clientY;sl=sc.scrollLeft;st=sc.scrollTop;sc.style.cursor="grabbing";e.preventDefault();});
 window.addEventListener("mousemove",e=>{if(!dn)return;sc.scrollLeft=sl-(e.clientX-sx);sc.scrollTop=st-(e.clientY-sy);});
 window.addEventListener("mouseup",()=>{dn=false;sc.style.cursor="grab";});})();
(function(){if(window.__mappz)return;window.__mappz=1;const sv=svg;

 let dn=false,lx,ly;

 window.addEventListener('mousemove',e=>{if(!dn||!gRot)return;const k=0.25*(300/gScale);gRot[0]+=(e.clientX-lx)*k;gRot[1]-=(e.clientY-ly)*k;gRot[1]=Math.max(-90,Math.min(90,gRot[1]));lx=e.clientX;ly=e.clientY;renderMap();});
 window.addEventListener('mouseup',()=>{dn=false;sv.style.cursor='grab';});})();
