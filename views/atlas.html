<style>
:root{--ink:#1c1c1c;--mut:#6f6f6f;--line:rgba(0,0,0,.12);--bg:#f5f3ef;--card:#fff;
--Measure:#3266ad;--Model:#8a4fb3;--Make:#b06a1e;--Manufacture:#2f8f6b;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
.top{padding:14px 18px 6px;}
h1{font-size:20px;font-weight:600;margin:0 0 6px;}
.bar{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;margin:5px 0;}
.grp{display:flex;gap:4px;align-items:center;}
.grp .lab{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin-right:3px;}
.btn{border:.5px solid var(--line);background:#fff;border-radius:13px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--ink);white-space:nowrap;}
.btn:hover{background:#eceae4}.btn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
input.search{border:.5px solid var(--line);border-radius:13px;padding:4px 10px;font-size:12px;width:130px;background:#fff;color:var(--ink);}
input[type=range]{accent-color:var(--ink);width:90px;}
.legend{display:flex;gap:11px;flex-wrap:wrap;font-size:11px;color:var(--mut);margin-top:3px;}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin-right:4px;}
.legend .gly{margin-right:3px;}
.threadbar{display:flex;flex-wrap:wrap;gap:4px;margin:5px 0 0;max-height:50px;overflow:auto;}
.tchip{border:.5px solid var(--line);background:#fff;border-radius:11px;padding:2px 8px;font:inherit;font-size:10.5px;cursor:pointer;color:var(--mut);}
.tchip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
/* .threadbar clips (max-height+overflow:auto), so the shared 2px-OUTSIDE focus ring is
   cut off on the top and bottom chip rows. Draw it inside the chip's own box instead:
   focus-visible only, so the resting appearance is byte-identical. */
.threadbar .tchip:focus-visible{outline:2px solid var(--ink);outline-offset:-2px;}
.tchip i{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:0;}
/*dragpan*/
.scroll{cursor:grab;overflow:auto;border-top:.5px solid var(--line);height:calc(100vh - 150px);background:#fcfbf9;}
#zoomwrap{position:relative;}
#stage{position:relative;transform-origin:0 0;}
#edges{position:absolute;left:0;top:0;pointer-events:none;z-index:1;}
.lanelab{position:absolute;left:6px;font-size:10.5px;color:var(--mut);font-weight:500;transform:translateY(-50%);width:150px;z-index:3;cursor:pointer;}
.lanelab:hover{color:var(--ink);text-decoration:underline;}
.lanelab .car{color:#c0bdb6;font-size:9px;}
.lanesep{position:absolute;left:0;border-top:.5px dashed rgba(0,0,0,.06);z-index:0;}
.yr{position:absolute;font-size:9.5px;}
.gl{position:absolute;border-left:1px solid rgba(0,0,0,.045);}
.gl.maj{border-left:1px solid rgba(0,0,0,.10);}
.dot{position:absolute;border-radius:50%;z-index:2;cursor:pointer;border:1px solid #fff;}
.c{position:absolute;background:var(--card);border:.5px solid var(--line);border-left:4px solid #999;border-radius:8px;padding:6px 9px;cursor:pointer;z-index:2;overflow:hidden;}
.c:hover{box-shadow:0 5px 16px rgba(0,0,0,.14);z-index:6;}
.c .ti{font-size:11.5px;font-weight:500;line-height:1.2;}
.c .pe{font-size:9.5px;color:var(--mut);margin-top:2px;line-height:1.15;}
.c .kx{font-size:9px;color:#aaa;margin-top:2px;}
.c .sg{font-size:10px;line-height:1.35;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.c.full .sg{-webkit-line-clamp:6;}
.dim{opacity:.12 !important;}
.sel{outline:2.5px solid var(--ink);outline-offset:1px;}
.hl{outline:2px solid var(--ink);outline-offset:1px;}
#fc{position:absolute;width:240px;background:var(--card);border:.5px solid var(--line);border-left:4px solid #999;border-radius:9px;padding:10px 12px;box-shadow:0 10px 34px rgba(0,0,0,.2);z-index:30;display:none;pointer-events:none;}
#fc .ti{font-size:13px;font-weight:600;}#fc .me{font-size:10.5px;color:var(--mut);margin-top:2px;}
#fc .sg{font-size:11px;margin-top:7px;line-height:1.45;}#fc .rel{font-size:10px;color:var(--mut);margin-top:7px;line-height:1.4;}
#fc .tg{font-size:9.5px;background:#f0ede7;color:#555;border-radius:8px;padding:1px 6px;margin:2px 3px 0 0;display:inline-block;}
.hint{font-size:11px;color:#b9b4ab;padding:5px 18px;}
.ylab{font-weight:600;font-size:15px;min-width:48px;}
#stage .lanelab{background:rgba(252,251,249,.93);z-index:7;padding:1px 6px 1px 3px;border-radius:0 5px 5px 0}
</style>

<h1>Timeline</h1>
<div class="bar">
  <div class="grp"><span class="lab">By</span><span id="axisBtns"></span></div>

</div>
<div class="legend"><span><i style="background:var(--Measure)"></i><span class="gly" data-k="Measure" aria-hidden="true"></span>Measure</span><span><i style="background:var(--Model)"></i><span class="gly" data-k="Model" aria-hidden="true"></span>Model</span><span><i style="background:var(--Make)"></i><span class="gly" data-k="Make" aria-hidden="true"></span>Make</span><span><i style="background:var(--Manufacture)"></i><span class="gly" data-k="Manufacture" aria-hidden="true"></span>Manufacture</span><span>line = builds-on → enables · click a lane name to expand it · click a card for its lineage</span></div>

<script>
const DATA=(window.CARDS||[]).filter(function(c){return c.year;});
const KC=window.KCOL, KINK=window.KINK, KGLY=window.KGLY;   // single source of truth (shared.js)
// legend glyphs: kind is never carried by colour alone (matches table.js / deck.html)
document.querySelectorAll(".legend .gly").forEach(e=>e.textContent=KGLY[e.dataset.k]||"");
const byId=TA.byId(DATA);
// Geography is DATA, not view logic: regenerate.py derives `region` (the swimlane)
// and `regionOrd` (its position in the canonical lane order) once, for every card.
// This view used to own the country->lane table, the US-band grouping and its short lane
// labels, and keyword-match `place` itself — a SECOND, parallel geography database that
// disagreed with the globe (Geneva was continental here and France there). All of it is DATA now:
// regenerate.py emits region, regionOrd, regionGroup and regionSub per card. Read, never
// re-derive. The two tiny lookups below are just those per-card fields collated by region.
const REGION_GROUP={},REGION_SUB={};
DATA.forEach(c=>{REGION_GROUP[c.region]=c.regionGroup;REGION_SUB[c.region]=c.regionSub;});
const groupOf=l=>REGION_GROUP[l]||l;
let axis="thread",size="overview",selThreads=[],selCard=null,q="",zoom=1;try{selThreads=getThreads();}catch(e){}
const expanded=new Set();
// Thread traces use the shared palette in shared.js so a thread keeps the same
// colour here and on the globe. Tracing caps at TPAL.length (five validated
// slots); FILTERING stays unlimited.
const TRACE=window.TPAL;
const slotOf=new Map();   // thread -> slot, held for as long as it stays selected
const claimSlot=()=>window.threadSlots(slotOf,selThreads);
const traceColor=t=>window.threadColor(slotOf,t);
claimSlot();
const DIM={overview:{w:13,h:14,gh:3,gv:5,dot:true},chip:{w:120,h:38,gh:12,gv:8},medium:{w:158,h:96,gh:14,gv:12},full:{w:158,h:150,gh:14,gv:12}};
const x0=200,minY=540,maxY=2030,WIDTH=3400,LOGK=35;
const YEARS=DATA.map(c=>c.year).filter(y=>y).sort((a,b)=>a-b);
// Log-in-time scale (the default and only axis): compresses the sparse pre-1800 range and
// expands the dense 20th–21st c. See TA.timeScale in ta.js.
const xs=TA.timeScale({x0,width:WIDTH,minY,maxY,k:LOGK}).xs;
const ERAS=window.ERAS;
const EVENTS=window.EVENTS;
function laneOrder(){
 if(axis==="kind")return window.KINDS.filter(k=>DATA.some(c=>c.kind===k));
 if(axis==="geo"){const p=new Map();DATA.forEach(c=>p.set(c.region,c.regionOrd));return [...p.keys()].sort((a,b)=>p.get(a)-p.get(b));}
 const ts={};DATA.forEach(c=>c.threads.forEach(t=>{ts[t]=Math.min(ts[t]??9999,c.year);}));
 return Object.keys(ts).sort((a,b)=>ts[a]-ts[b]);
}
const laneKey=c=>axis==="kind"?c.kind:axis==="geo"?c.region:c.primary;
const laneMode=l=>expanded.has(l)?"medium":size;
let pos={},layoutW=0,layoutH=0,lanes=[],LM={},LSEP=[],LCOUNT={},LTOP={},LBOT={};
const ERABAND=28; // dedicated top band for era labels (pushes everything below down)
// Era gridlines + labels (TA.eraBand in ta.js). No class on the gridline divs here; layoutH
// is read fresh at each call.
function eraBandHtml(){return TA.eraBand(xs,layoutH,"");}
function layout(){
 pos={};lanes=laneOrder();LM={};LSEP=[];LCOUNT={};LTOP={};LBOT={};
 const laneItems={};lanes.forEach(l=>laneItems[l]=[]);
 for(const c of DATA){const lk=laneKey(c);if(laneItems[lk])laneItems[lk].push({c,ghost:false});}
 if(axis==="thread")for(const c of DATA)for(const t of c.threads)if(t!==c.primary&&laneItems[t])laneItems[t].push({c,ghost:true});
 let curY=36+ERABAND;
 for(const l of lanes){LTOP[l]=curY;const d=DIM[laneMode(l)];const items=laneItems[l].sort((a,b)=>a.c.year-b.c.year);LCOUNT[l]=items.filter(i=>!i.ghost).length;
   const rr=[];for(const it of items){const x=xs(it.c.year);let r=-1;for(let i=0;i<rr.length;i++)if(x-rr[i]>=d.gh){r=i;break;}if(r<0){r=rr.length;rr.push(0);}rr[r]=x+d.w;it.row=r;it.x=x;it.d=d;}
   const nr=Math.max(1,rr.length);
   for(const it of items){const y=curY+it.row*(d.h+d.gv);if(!it.ghost)pos[it.c.id]={x:it.x,y,w:d.w,h:d.h};it._y=y;}
   LM[l]=curY+(nr*(d.h+d.gv)-d.gv)/2;curY+=nr*(d.h+d.gv)+(d.dot?10:16);LSEP.push(curY-7);LBOT[l]=curY-8;laneItems[l]=items;}
 layoutH=curY+8;layoutW=xs(maxY)+170;
 return laneItems;
}
const {anc,desc}=TA.lineage(byId);
const scroll=document.getElementById("scroll"),zoomwrap=document.getElementById("zoomwrap"),stage=document.getElementById("stage"),svg=document.getElementById("edges"),fc=document.getElementById("fc");
// data-bl is the label's PIN BASE in stage coordinates, emitted by render() alongside the
// label itself: 0 for a top-level lane (flush to the viewport edge) and 92 for a sub-lane
// indented inside a group band. It used to be inferred here from `parseFloat(e.style.left)
// ||0`, which is only correct for the sub-lane branch — the top-level branch emits no
// inline `left` at all, so the parse was NaN and the base came from the ||0 fallback
// rather than from anything anyone chose. Same pixels, but the value is now stated, so
// adding an inline `left` to either branch can no longer silently move the pinning.
function pinLabels(){const z=zoom||1;document.querySelectorAll('#stage .lanelab').forEach(e=>{e.style.left=(((+e.dataset.bl)+scroll.scrollLeft)/z)+'px';});}
function applyZoom(){stage.style.transform="scale("+zoom+")";zoomwrap.style.width=(layoutW*zoom)+"px";zoomwrap.style.height=(layoutH*zoom)+"px";document.getElementById("zoom").value=Math.round(zoom*100);pinLabels();}
function render(){
 let handoffs=0;   // lane crossings on the geography axis = leads changing hands
 const laneItems=layout();
 stage.style.width=layoutW+"px";stage.style.height=layoutH+"px";
 svg.setAttribute("width",layoutW);svg.setAttribute("height",layoutH);svg.setAttribute("viewBox",`0 0 ${layoutW} ${layoutH}`);
 let lit=null;if(selCard){lit=new Set([selCard]);anc(selCard,lit);desc(selCard,lit);}
 const inT=id=>selThreads.length&&threadMatch(byId[id],selThreads);
 let html="";
 lanes.forEach((l,i)=>{if(i<lanes.length-1)html+=`<div class="lanesep" style="top:${LSEP[i]}px;width:${layoutW}px"></div>`;});
 let gi=0;
 while(gi<lanes.length){const g=groupOf(lanes[gi]);let gj=gi;while(gj+1<lanes.length&&groupOf(lanes[gj+1])===g)gj++;
   if(gj>gi){const top=LTOP[lanes[gi]],bot=LBOT[lanes[gj]];
     html+=`<div style="position:absolute;left:0;top:${top-2}px;height:${bot-top}px;width:${layoutW}px;background:rgba(176,106,30,0.04);z-index:0"></div>`;
     html+=`<div style="position:absolute;left:8px;top:${top-2}px;height:${bot-top}px;border-left:2px solid rgba(0,0,0,.28);z-index:3"></div>`;
     html+=`<div style="position:absolute;left:14px;top:${(top+bot)/2}px;transform:translateY(-50%);font-size:11.5px;font-weight:600;color:var(--ink);width:80px;z-index:3">${g}</div>`;
     for(let k=gi;k<=gj;k++){const l=lanes[k];html+=`<div class="lanelab" data-lane="${enc(l)}" data-bl="92" style="top:${LM[l]}px;left:92px;width:110px">${REGION_SUB[l]||l} <span class="car">${LCOUNT[l]}${expanded.has(l)?" ▾":""}</span></div>`;}
   } else {const l=lanes[gi];html+=`<div class="lanelab" data-lane="${enc(l)}" data-bl="0" style="top:${LM[l]}px">${l} <span class="car">${LCOUNT[l]}${expanded.has(l)?" ▾":""}</span></div>`;}
   gi=gj+1;}
lanes.forEach((l,i)=>{if(LTOP[l]!=null&&i%2)html+=`<div style="position:absolute;left:0;top:${LTOP[l]}px;width:${layoutW}px;height:${(LBOT[l]-LTOP[l])}px;background:rgba(0,0,0,.03);z-index:0"></div>`;});
 html+=eraBandHtml();
 {const EVROWS=[16,27,38];const evRight=[-1e9,-1e9,-1e9];EVENTS.forEach((ev)=>{const x=xs(ev[0]);const lab=x+3;const w=ev[1].length*4.4+6;let row=-1;for(let s=0;s<EVROWS.length;s++){if(lab-evRight[s]>=3){row=s;break;}}if(row<0){row=EVROWS.length-1;}evRight[row]=lab+w;const ty=EVROWS[row]+ERABAND;html+=`<div style="position:absolute;left:${x}px;top:${16+ERABAND}px;height:${layoutH-16-ERABAND}px;border-left:1px solid rgba(154,106,58,.35);z-index:0"></div><div style="position:absolute;left:${x}px;top:${16+ERABAND}px;width:6px;height:6px;border-radius:50%;background:#9a6a3a;transform:translate(-3px,-3px);z-index:4"></div><div style="position:absolute;left:${lab}px;top:${ty}px;font-size:8px;color:#7a5a30;background:rgba(252,251,249,.85);padding:0 2px;z-index:4;white-space:nowrap">${ev[1]}</div>`;});}
 for(let y=600;y<=2030;y+=10){if(y<1200&&y%100)continue;const gx=xs(y),maj=(y%50===0);html+=`<div class="gl ${maj?'maj':''}" style="left:${gx}px;top:${26+ERABAND}px;height:${layoutH-32-ERABAND}px"></div>`;html+=`<div class="yr" style="left:${gx+2}px;top:${10+ERABAND}px;color:${maj?'#8f8f8f':'#c9c9c9'};${maj?'font-weight:600':''}">${maj?y:"’"+String(y).slice(2)}</div>`;}
 for(const l of lanes){const dotmode=DIM[laneMode(l)].dot;for(const it of laneItems[l]){const c=it.c;const matchq=q&&(c.name.toLowerCase().includes(q)||(c.person||'').toLowerCase().includes(q));
   let extra="";if(lit){if(!it.ghost&&!lit.has(c.id))extra=" dim";else if(!it.ghost&&lit.has(c.id)&&c.id!==selCard)extra=" hl";}
   else if(selThreads.length&&!inT(c.id))extra=" dim"; if(c.id===selCard&&!it.ghost)extra+=" sel"; if(matchq)extra+=" hl";
   const op=it.ghost?(extra.includes("dim")?"":"opacity:.4;"):"";
   if(dotmode){const r=it.ghost?3:4.2;html+=`<div class="dot${extra}" data-id="${enc(c.id)}" style="left:${it.x}px;top:${it._y}px;width:${r*2}px;height:${r*2}px;background:${KC[c.kind]};${op}"></div>`;}
   else{const d=it.d;const body=laneMode(l)==="chip"?`<div class="ti" style="color:${KINK[c.kind]}">${c.name}</div><div class="kx">${c.year}</div>`:`<div class="ti" style="color:${KINK[c.kind]}">${c.name}</div><div class="pe">${c.person||""}</div><div class="kx">${c.kind} · ${c.year}</div><div class="sg">${c.sig||""}</div>`;
   html+=`<div class="c${laneMode(l)==="full"?" full":""}${extra}" data-id="${enc(c.id)}" style="left:${it.x}px;top:${it._y}px;width:${d.w}px;height:${d.h}px;overflow:hidden;border-left-color:${KC[c.kind]};${it.ghost?'border-style:dashed;'+op:''}">${body}</div>`;}
 }}
 [...stage.querySelectorAll('.c,.dot,.lanelab,.lanesep,.gl,.yr')].forEach(e=>e.remove());
 stage.insertAdjacentHTML("beforeend",html);
 let e="";
 for(const c of DATA){const a=pos[c.id];if(!a)continue;for(const en of (c.en||[])){const b=pos[en];if(!b)continue;
   const x1=a.x+a.w,y1=a.y+a.h/2,x2=b.x,y2=b.y+b.h/2;const on=lit?(lit.has(c.id)&&lit.has(en)):(selThreads.length?(inT(c.id)&&inT(en)):true);
   const op=lit?(on?.9:.04):(selThreads.length?(on?.5:.05):.2);const sw=(lit&&on)?2:1;const mx=(x1+x2)/2;
   e+=`<path d="M${x1} ${y1} C${mx} ${y1} ${mx} ${y2} ${x2} ${y2}" fill="none" stroke="${KC[byId[en].kind]}" stroke-opacity="${op}" stroke-width="${sw}"/>`;}}
 if(selThreads.length){let ee="";selThreads.forEach(function(stt){const col=traceColor(stt);if(!col)return;const mem=DATA.filter(c=>c.threads.includes(stt)&&pos[c.id]).sort((a,b)=>a.year-b.year);if(mem.length>1){const h=pos[mem[0].id];let d="M"+(h.x+h.w/2)+" "+(h.y+h.h/2);for(let i=1;i<mem.length;i++){const p=pos[mem[i].id];d+=" L"+(p.x+p.w/2)+" "+(p.y+p.h/2);}
   // direct label at the head of the trace: identity is never colour-alone (the
   // line is the coloured mark, the name stays in ink with a surface halo).
   ee+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="7" stroke-opacity="0.18" stroke-linecap="round" stroke-linejoin="round"/><path d="${d}" fill="none" stroke="${col}" stroke-width="1.8" stroke-opacity="0.9"/><text x="${h.x+h.w/2}" y="${h.y+h.h/2-9}" font-size="10" font-weight="600" fill="#1c1c1c" stroke="#fcfbf9" stroke-width="3.5" paint-order="stroke" style="pointer-events:none">${TA.esc(stt)}</text>`;
   // The handoff needs no new field: on the geography axis a change of lane IS
   // the lead changing hands. Mark it with an arrowhead in the trace's own
   // colour (shape, not a new hue — the canvas has no colour channel left).
   // Compare GROUPS, not lanes: the US occupies four lanes, and a hop from the
   // Northeast to Silicon Valley is not the lead leaving the country.
   if(axis==="geo")for(let i=1;i<mem.length;i++){const A=mem[i-1],B=mem[i];
     if(groupOf(laneKey(A))===groupOf(laneKey(B)))continue;
     const p=pos[A.id],r=pos[B.id];const x1=p.x+p.w/2,y1=p.y+p.h/2,x2=r.x+r.w/2,y2=r.y+r.h/2;
     const mx=(x1+x2)/2,my=(y1+y2)/2,an=Math.atan2(y2-y1,x2-x1),ux=Math.cos(an),uy=Math.sin(an);
     const pts=[[mx+7*ux,my+7*uy],[mx-3*ux-4.5*uy,my-3*uy+4.5*ux],[mx-3*ux+4.5*uy,my-3*uy-4.5*ux]]
       .map(q=>q[0].toFixed(1)+","+q[1].toFixed(1)).join(" ");
     // pointer-events:auto — #edges sets pointer-events:none for the whole overlay and
     // it inherits, so without this override the <title> tooltip below never fires and
     // the "hover it" hint in the status line is a lie. The arrowheads are the only
     // thing in this SVG meant to be hoverable.
     ee+=`<polygon points="${pts}" fill="${col}" stroke="#fcfbf9" stroke-width="1.5" style="pointer-events:auto"><title>${TA.esc(stt)}: ${TA.esc(groupOf(laneKey(A)))} → ${TA.esc(groupOf(laneKey(B)))} (${A.year}→${B.year}, ${TA.esc(B.name)})</title></polygon>`;
     handoffs++;}
  }});e=ee+e;}
 svg.innerHTML=e;stage.appendChild(fc);
 stage.querySelectorAll('.c,.dot').forEach(el=>{el.onmouseenter=()=>showFull(dec(el.dataset.id),el);el.onmouseleave=hideFull;el.onclick=()=>{const id=dec(el.dataset.id);try{showDetail(byId[id]);}catch(e){}selCard=selCard===id?null:id;render();};const _c=byId[dec(el.dataset.id)];kbd(el,()=>el.onclick(),_c&&_c.name);});
 stage.querySelectorAll('.lanelab').forEach(el=>{el.onclick=()=>{const l=dec(el.dataset.lane);expanded.has(l)?expanded.delete(l):expanded.add(l);render();};kbd(el,()=>el.onclick(),"Expand "+dec(el.dataset.lane));});
 applyZoom();
 const untraced=selThreads.filter(t=>!slotOf.has(t)).length;
 document.getElementById("hint").textContent=`${DATA.length} cards · ${lanes.length} lanes · by ${axis} · click a lane name to expand`
  +(handoffs?` · ${handoffs} handoff${handoffs>1?"s":""} (▶ = the trace crosses into another region; hover for which)`:"")
  +(untraced?` · tracing ${slotOf.size} of ${selThreads.length} selected — ${untraced} still filtering but untraced (${TRACE.length} trace colours); deselect one to trace another`:"");
}
function showFull(id,el){const c=byId[id];fc.style.borderLeftColor=KC[c.kind];
 fc.innerHTML=`<div class="ti" style="color:${KINK[c.kind]}">${c.name}</div><div class="me">${c.kind} · ${c.place||""} · ${c.year}</div><div class="me">${c.person||""}</div><div class="sg">${c.sig||""}</div><div class="rel"><b>builds on:</b> ${(c.bo||[]).map(x=>byId[x]?byId[x].name:x).join(", ")||"—"}<br><b>enables:</b> ${(c.en||[]).map(x=>byId[x]?byId[x].name:x).join(", ")||"—"}</div><div style="margin-top:6px">${c.threads.map(t=>`<span class="tg">${t}</span>`).join("")}</div>`;
 const lx=parseFloat(el.style.left)+parseFloat(el.style.width||el.offsetWidth)+8;
 fc.style.left=Math.max(4,Math.min(lx,layoutW-248))+"px";fc.style.top=(parseFloat(el.style.top)-6)+"px";fc.style.display="block";}
function hideFull(){fc.style.display="none";}
const enc=s=>encodeURIComponent(s),dec=s=>decodeURIComponent(s);
function mk(el,opts,cur,fn){document.getElementById(el).innerHTML=opts.map(o=>`<button class="btn ${o[0]===cur?'on':''}" data-v="${o[0]}">${o[1]}</button>`).join("");document.querySelectorAll(`#${el} .btn`).forEach(b=>b.onclick=()=>fn(b.dataset.v));}
const axisBtns=()=>mk("axisBtns",[["thread","Thread"],["geo","Geography"],["kind","Four Ms"]],axis,v=>{axis=v;selCard=null;expanded.clear();axisBtns();render();fitWidth();});
const sizeBtns=()=>mk("sizeBtns",[["overview","Overview"],["chip","Chip"],["medium","Medium"],["full","Full"]],size,v=>{size=v;sizeBtns();render();});
function threadbar(){const all=[...new Set(DATA.flatMap(c=>c.threads))].sort();
 // The chips are real <button>s now, and this rebuilds them wholesale — so activating one
 // by keyboard destroyed the focused element and dropped focus to <body>, making the bar
 // untraversable by keyboard. Remember which chip had focus and restore it after.
 const act=document.activeElement,
       refocusT=act&&act.closest?(act.closest("#threadbar .tchip")||{}).dataset&&act.closest("#threadbar .tchip").dataset.t:null;
 // the selected chips double as the trace legend — swatch carries identity, text stays ink
 document.getElementById("threadbar").innerHTML=all.map(t=>{const col=traceColor(t);
  // aria-pressed, not the .on class alone: these are toggles and the selected set is the
  // primary state of the view, so it has to be in the accessibility tree, not just in CSS.
  const on=selThreads.includes(t);
  return `<button type="button" class="tchip ${on?'on':''}" aria-pressed="${on}" data-t="${enc(t)}">${col?`<i style="background:${col}"></i>`:""}${t}</button>`;}).join("");
 document.querySelectorAll("#threadbar .tchip").forEach(b=>b.onclick=()=>{const t=dec(b.dataset.t);const i=selThreads.indexOf(t);
  if(i>=0)selThreads.splice(i,1);else selThreads.push(t);
  claimSlot();   // reconciles both directions; survivors keep their slot
  try{setThreads(selThreads);}catch(e){}threadbar();render();});
 if(refocusT){const back=document.querySelector(`#threadbar .tchip[data-t="${refocusT}"]`);if(back)back.focus();}}
function fitWidth(){zoom=Math.max(.2,Math.min(1.5,(scroll.clientWidth-16)/layoutW));applyZoom();}
function fitAll(){zoom=Math.max(.12,Math.min(1.5,Math.min((scroll.clientWidth-16)/layoutW,(scroll.clientHeight-16)/layoutH)));applyZoom();}
document.getElementById("zoom").oninput=e=>{zoom=e.target.value/100;applyZoom();};
document.getElementById("fitw").onclick=fitWidth;document.getElementById("fitall").onclick=fitAll;
document.getElementById("search").oninput=e=>{q=e.target.value.toLowerCase();render();};
document.getElementById("reset").onclick=()=>{selThreads=[];selCard=null;q="";expanded.clear();slotOf.clear();document.getElementById("search").value="";threadbar();render();fitWidth();};
(function(){const sc=document.getElementById("scroll");let dn=false,sx,sy,sl,st;
 sc.addEventListener("mousedown",e=>{if(e.target.closest(".c,.dot,.mdot,.lanelab,a,button,input,.tchip"))return;dn=true;sx=e.clientX;sy=e.clientY;sl=sc.scrollLeft;st=sc.scrollTop;sc.style.cursor="grabbing";e.preventDefault();});
 window.addEventListener("mousemove",e=>{if(!dn)return;sc.scrollLeft=sl-(e.clientX-sx);sc.scrollTop=st-(e.clientY-sy);});
 window.addEventListener("mouseup",()=>{dn=false;sc.style.cursor="grab";});})();
axisBtns();sizeBtns();threadbar();render();fitWidth();
// Registered once at init. It used to live inside the axis-button callback, so
// label pinning did nothing until you switched axis, and every switch after
// that added another duplicate listener.
scroll.addEventListener("scroll",pinLabels);
</script>
</body></html>
