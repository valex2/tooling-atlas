<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tooling Cards — Atlas</title>
<style>
:root{--ink:#1c1c1c;--mut:#6f6f6f;--line:rgba(0,0,0,.12);--bg:#f5f3ef;--card:#fff;
--Measure:#3266ad;--Model:#8a4fb3;--Make:#b06a1e;--Manufacture:#2f8f6b;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
.top{padding:14px 18px 6px;}
h1{font-size:20px;font-weight:600;margin:0 0 6px;}
.bar{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;margin:5px 0;}
.grp{display:flex;gap:4px;align-items:center;}
.grp .lab{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin-right:3px;}
.btn{border:.5px solid var(--line);background:#fff;border-radius:13px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--ink);white-space:nowrap;}
.btn:hover{background:#eceae4}.btn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
input.search{border:.5px solid var(--line);border-radius:13px;padding:4px 10px;font-size:12px;width:130px;background:#fff;color:var(--ink);}
input[type=range]{accent-color:var(--ink);width:90px;}
.legend{display:flex;gap:11px;flex-wrap:wrap;font-size:11px;color:var(--mut);margin-top:3px;}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin-right:4px;}
.threadbar{display:flex;flex-wrap:wrap;gap:4px;margin:5px 0 0;max-height:50px;overflow:auto;}
.tchip{border:.5px solid var(--line);background:#fff;border-radius:11px;padding:2px 8px;font-size:10.5px;cursor:pointer;color:var(--mut);}
.tchip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
/*dragpan*/
.scroll{cursor:grab;overflow:auto;border-top:.5px solid var(--line);height:calc(100vh - 150px);background:#fcfbf9;}
#zoomwrap{position:relative;}
#stage{position:relative;transform-origin:0 0;}
#edges{position:absolute;left:0;top:0;pointer-events:none;z-index:1;}
.lanelab{position:absolute;left:6px;font-size:10.5px;color:var(--mut);font-weight:500;transform:translateY(-50%);width:150px;z-index:3;cursor:pointer;}
.lanelab:hover{color:var(--ink);text-decoration:underline;}
.lanelab .car{color:#c0bdb6;font-size:9px;}
.lanesep{position:absolute;left:0;border-top:.5px dashed rgba(0,0,0,.06);z-index:0;}
.yr{position:absolute;font-size:9.5px;}
.gl{position:absolute;border-left:1px solid rgba(0,0,0,.045);}
.gl.maj{border-left:1px solid rgba(0,0,0,.10);}
.dot{position:absolute;border-radius:50%;z-index:2;cursor:pointer;border:1px solid #fff;}
.c{position:absolute;background:var(--card);border:.5px solid var(--line);border-left:4px solid #999;border-radius:8px;padding:6px 9px;cursor:pointer;z-index:2;overflow:hidden;}
.c:hover{box-shadow:0 5px 16px rgba(0,0,0,.14);z-index:6;}
.c .ti{font-size:11.5px;font-weight:500;line-height:1.2;}
.c .pe{font-size:9.5px;color:var(--mut);margin-top:2px;line-height:1.15;}
.c .kx{font-size:9px;color:#aaa;margin-top:2px;}
.c .sg{font-size:10px;line-height:1.35;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.c.full .sg{-webkit-line-clamp:6;}
.dim{opacity:.12 !important;}
.sel{outline:2.5px solid var(--ink);outline-offset:1px;}
.hl{outline:2px solid var(--ink);outline-offset:1px;}
#fc{position:absolute;width:240px;background:var(--card);border:.5px solid var(--line);border-left:4px solid #999;border-radius:9px;padding:10px 12px;box-shadow:0 10px 34px rgba(0,0,0,.2);z-index:30;display:none;pointer-events:none;}
#fc .ti{font-size:13px;font-weight:600;}#fc .me{font-size:10.5px;color:var(--mut);margin-top:2px;}
#fc .sg{font-size:11px;margin-top:7px;line-height:1.45;}#fc .rel{font-size:10px;color:var(--mut);margin-top:7px;line-height:1.4;}
#fc .tg{font-size:9.5px;background:#f0ede7;color:#555;border-radius:8px;padding:1px 6px;margin:2px 3px 0 0;display:inline-block;}
.hint{font-size:11px;color:#b9b4ab;padding:5px 18px;}
.ylab{font-weight:600;font-size:15px;min-width:48px;}
#mtip{position:fixed;pointer-events:none;background:var(--card);border:.5px solid var(--line);border-left:4px solid #999;border-radius:8px;padding:8px 10px;font-size:12px;max-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.16);display:none;z-index:60;}
.maplbl{position:absolute;transform:translate(-50%,-100%);font-size:10px;font-weight:600;color:var(--ink);white-space:nowrap;pointer-events:none;text-shadow:0 1px 2px #fcfbf9,0 -1px 2px #fcfbf9,1px 0 2px #fcfbf9,-1px 0 2px #fcfbf9;}
#stage .lanelab{background:rgba(252,251,249,.93);z-index:7;padding:1px 6px 1px 3px;border-radius:0 5px 5px 0}
</style>
</head><body>
<script src="../data/cards.js"></script>
<script src="../shared.js"></script>
<div id="appnav"></div>
<div class="top">
<h1>Timeline</h1>
<div class="bar">
  <div class="grp"><span class="lab">By</span><span id="axisBtns"></span></div>
  <div class="grp"><span class="lab">Detail</span><span id="sizeBtns"></span></div>
  <div class="grp"><span class="lab">Zoom</span><input type="range" id="zoom" min="20" max="150" value="100"><button class="btn" id="fitw">fit width</button><button class="btn" id="fitall">fit all</button></div>
  <div class="grp"><span class="lab">Time</span><span id="timeBtns"></span></div>
  <input class="search" id="search" placeholder="search…">
  <button class="btn" id="reset">reset</button>
</div>
<div class="legend"><span><i style="background:var(--Measure)"></i>Measure</span><span><i style="background:var(--Model)"></i>Model</span><span><i style="background:var(--Make)"></i>Make</span><span><i style="background:var(--Manufacture)"></i>Manufacture</span><span>line = builds-on → enables · click a lane name to expand it · click a card for its lineage</span></div>
<div class="ctrl" id="scrubwrap" style="display:none"><button class="btn" id="mplay">▶ play migration</button><span class="ylab" id="scrubyr">2030</span><input type="range" id="scrub" min="1600" max="2030" value="2030" style="flex:1;accent-color:var(--ink)"><span style="font-size:10px;color:var(--mut);white-space:nowrap">faint = old · solid = recent</span></div>
<div class="threadbar" id="threadbar"></div>
</div>
<div class="scroll" id="scroll"><div id="zoomwrap"><div id="stage"><svg id="edges"></svg><div id="fc"></div></div></div></div>
<div class="hint" id="hint"></div>
<script>
const DATA=(window.CARDS||[]).filter(function(c){return c.year;});
const KC=window.KCOL, KINK=window.KINK;   // single source of truth (shared.js)
const byId=Object.fromEntries(DATA.map(c=>[c.id,c]));
const COUNTRIES={type:"FeatureCollection",features:[]};
let mapT=2030,mplaying=false,mtimer=null;let gScale=0,gRot=null,gProj=null,gPath=null;
const YR0=1600,YR1=2025;
function colTime(y){const f=Math.max(0,Math.min(1,(y-YR0)/(YR1-YR0)));return `hsl(${Math.round(215-200*f)},62%,48%)`;}
const tfrac=y=>Math.max(0,Math.min(1,(y-YR0)/(YR1-YR0)));
const mgroups={};DATA.forEach(c=>{if(c.lat==null)return;const k=c.lat.toFixed(2)+","+c.lon.toFixed(2);(mgroups[k]=mgroups[k]||[]).push(c);});
const moff={};Object.values(mgroups).forEach(g=>g.forEach((c,i)=>{moff[c.id]=g.length<2?[0,0]:[Math.cos(i/g.length*6.283)*0.45,Math.sin(i/g.length*6.283)*0.45];}));
const llc=c=>{const o=moff[c.id]||[0,0];return [c.lon+o[0],c.lat+o[1]];};
const hubG={};DATA.forEach(c=>{if(c.lat==null)return;const k=c.lat.toFixed(1)+","+c.lon.toFixed(1);(hubG[k]=hubG[k]||[]).push(c);});
const HUBS=Object.values(hubG).map(g=>({n:g.length,city:(g[0].place||"").split(",")[0],lat:g[0].lat,lon:g[0].lon})).filter(h=>h.n>=3).sort((a,b)=>b.n-a.n).slice(0,12);
function dataCentroid(){let x=0,y=0,z=0,n=0;DATA.forEach(c=>{if(c.lat==null)return;const la=c.lat*Math.PI/180,lo=c.lon*Math.PI/180;x+=Math.cos(la)*Math.cos(lo);y+=Math.cos(la)*Math.sin(lo);z+=Math.sin(la);n++;});x/=n;y/=n;z/=n;return [Math.atan2(y,x)*180/Math.PI,Math.atan2(z,Math.hypot(x,y))*180/Math.PI];}
const REGIONS=[["Netherlands",["Netherlands","Delft","Veldhoven","Eindhoven"]],["Britain",["England","Britain","London","Birmingham","Manchester","Derbyshire","Cromford","Atlantic","Oxford"]],["France",["France","Paris"]],["Continental Europe",["Germany","Jena","Berlin","Heidelberg","Peenem","Switzerland","Bern","Sweden","Umea","Finland","Helsinki","Italy","Padua","Austria"]],["US Northeast",["New Jersey","Murray Hill","Massachusetts","Cambridge, USA","Bedford","Connecticut","New York","Princeton","Pennsylvania","Schenectady","Derby, USA","Maryland","Bell Labs","Armonk","Yorktown"]],["US Midwest",["Detroit","Midwest","Michigan","Ohio","Cincinnati","Chicago","Illinois","Wisconsin"]],["Silicon Valley / California",["California","Silicon Valley","Santa Clara","Stanford","Berkeley","Hawthorne","Mountain View","San Francisco","San Diego","Pasadena","Caltech","Palo Alto","Menlo","Sunnyvale","Cupertino"]],["US (other)",["Texas","Boulder","Colorado","Washington","United States","USA"]],["Canada",["Canada","Toronto","Waterloo","Montreal"]],["Russia",["Russia","Soviet","Baikonur","Moscow"]],["Japan",["Japan","Tokyo","Osaka"]],["Taiwan",["Taiwan","Hsinchu"]],["China",["China","Shenzhen","Beijing","Hangzhou","Shanghai"]]];
function regionOf(p){p=p||"";for(const [lab,keys] of REGIONS)for(const k of keys)if(p.indexOf(k)>=0)return lab;return "Other";}
DATA.forEach(c=>c.region=regionOf(c.place));
const GEOGROUP={"US Northeast":"United States","US Midwest":"United States","Silicon Valley / California":"United States","US (other)":"United States"};
const SUBLABEL={"US Northeast":"Northeast","US Midwest":"Midwest","Silicon Valley / California":"Silicon Valley","US (other)":"Other"};
const groupOf=l=>GEOGROUP[l]||l;
let axis="thread",size="overview",selThreads=[],selCard=null,q="",zoom=1;try{selThreads=getThreads();}catch(e){}
const expanded=new Set();
const DIM={overview:{w:13,h:14,gh:3,gv:5,dot:true},chip:{w:120,h:38,gh:12,gv:8},medium:{w:158,h:96,gh:14,gv:12},full:{w:158,h:150,gh:14,gv:12}};
const x0=200,minY=1200,maxY=2030,SPAN=830,WIDTH=3400;
const YEARS=DATA.map(c=>c.year).filter(y=>y).sort((a,b)=>a-b);
function densFrac(y){let lo=0,hi=YEARS.length;while(lo<hi){const m=(lo+hi)>>1;if(YEARS[m]<=y)lo=m+1;else hi=m;}return lo/YEARS.length;}
let timeScale="comp";
const ERAS=window.ERAS;
const EVENTS=[[1769,"Watt steam engine"],[1776,"American Revolution"],[1957,"Sputnik"],[1969,"Moon landing"],[1971,"Microprocessor"],[1989,"World Wide Web"],[2003,"Iraq War"],[2007,"iPhone"],[2012,"Deep learning"],[2020,"COVID-19"]];
function xs(y){y=Math.max(minY,Math.min(maxY,y));const n=(y-minY)/SPAN;return timeScale==="even"?x0+WIDTH*n:timeScale==="comp"?x0+WIDTH*Math.pow(n,1.8):x0+WIDTH*densFrac(y);}
function laneOrder(){
 if(axis==="kind")return ["Measure","Model","Make","Manufacture"].filter(k=>DATA.some(c=>c.kind===k));
 if(axis==="geo"){const p=new Set(DATA.map(c=>c.region));return REGIONS.map(r=>r[0]).concat(["Other"]).filter(r=>p.has(r));}
 const ts={};DATA.forEach(c=>c.threads.forEach(t=>{ts[t]=Math.min(ts[t]??9999,c.year);}));
 return Object.keys(ts).sort((a,b)=>ts[a]-ts[b]);
}
const laneKey=c=>axis==="kind"?c.kind:axis==="geo"?c.region:c.primary;
const laneMode=l=>expanded.has(l)?"medium":size;
let pos={},layoutW=0,layoutH=0,lanes=[],LM={},LSEP=[],LCOUNT={},LTOP={},LBOT={};
const ERABAND=28; // dedicated top band for era labels (pushes everything below down)
// lay era labels left-to-right, bumping to a lower sub-row when one would overlap the previous on its row
function eraBandHtml(){const SUB=[1,10,19];const rightEdge=[-1e9,-1e9,-1e9];let h="";
 ERAS.forEach(e=>{const a=xs(e[1]),b=xs(e[2]);
  h+=`<div style="position:absolute;left:${a}px;top:0;height:${layoutH}px;border-left:1px solid rgba(0,0,0,.08);z-index:0"></div>`;
  const cx=(a+b)/2,w=e[0].length*5.6+12;let left=cx-w/2;
  let r=0;for(;r<SUB.length;r++){if(left>=rightEdge[r]+4)break;}
  if(r>=SUB.length){r=0;for(let i=1;i<SUB.length;i++)if(rightEdge[i]<rightEdge[r])r=i;}
  rightEdge[r]=Math.max(rightEdge[r],left+w);
  h+=`<div style="position:absolute;left:${cx}px;top:${SUB[r]}px;transform:translateX(-50%);font-size:9px;font-weight:600;color:rgba(0,0,0,.32);z-index:4;white-space:nowrap;background:rgba(252,251,249,.9);padding:0 3px;border-radius:3px">${e[0]}</div>`;});
 return h;}
function layout(){
 pos={};lanes=laneOrder();LM={};LSEP=[];LCOUNT={};LTOP={};LBOT={};
 const laneItems={};lanes.forEach(l=>laneItems[l]=[]);
 for(const c of DATA){const lk=laneKey(c);if(laneItems[lk])laneItems[lk].push({c,ghost:false});}
 if(axis==="thread")for(const c of DATA)for(const t of c.threads)if(t!==c.primary&&laneItems[t])laneItems[t].push({c,ghost:true});
 let curY=36+ERABAND;
 for(const l of lanes){LTOP[l]=curY;const d=DIM[laneMode(l)];const items=laneItems[l].sort((a,b)=>a.c.year-b.c.year);LCOUNT[l]=items.filter(i=>!i.ghost).length;
   const rr=[];for(const it of items){const x=xs(it.c.year);let r=-1;for(let i=0;i<rr.length;i++)if(x-rr[i]>=d.gh){r=i;break;}if(r<0){r=rr.length;rr.push(0);}rr[r]=x+d.w;it.row=r;it.x=x;it.d=d;}
   const nr=Math.max(1,rr.length);
   for(const it of items){const y=curY+it.row*(d.h+d.gv);if(!it.ghost)pos[it.c.id]={x:it.x,y,w:d.w,h:d.h};it._y=y;}
   LM[l]=curY+(nr*(d.h+d.gv)-d.gv)/2;curY+=nr*(d.h+d.gv)+(d.dot?10:16);LSEP.push(curY-7);LBOT[l]=curY-8;laneItems[l]=items;}
 layoutH=curY+8;layoutW=xs(maxY)+170;
 return laneItems;
}
function anc(id,s){for(const p of (byId[id].bo||[]))if(byId[p]&&!s.has(p)){s.add(p);anc(p,s);}return s;}
function desc(id,s){for(const e of (byId[id].en||[]))if(byId[e]&&!s.has(e)){s.add(e);desc(e,s);}return s;}
const scroll=document.getElementById("scroll"),zoomwrap=document.getElementById("zoomwrap"),stage=document.getElementById("stage"),svg=document.getElementById("edges"),fc=document.getElementById("fc");
function pinLabels(){if(axis==='map')return;const z=zoom||1;document.querySelectorAll('#stage .lanelab').forEach(e=>{if(e.dataset.bl==null)e.dataset.bl=parseFloat(e.style.left)||0;e.style.left=(((+e.dataset.bl)+scroll.scrollLeft)/z)+'px';});}
function applyZoom(){if(axis==="map")return;stage.style.transform="scale("+zoom+")";zoomwrap.style.width=(layoutW*zoom)+"px";zoomwrap.style.height=(layoutH*zoom)+"px";document.getElementById("zoom").value=Math.round(zoom*100);pinLabels();}
function syncCtrl(){const m=axis==="map";const sw=document.getElementById("scrubwrap");if(sw)sw.style.display=m?"flex":"none";const tb=document.getElementById("threadbar");if(tb)tb.style.display=m?"none":"flex";}
function placeLabels(){const ov=document.getElementById('maplabels');if(!ov||axis!=='map'||!gProj)return;const ctr=[-gRot[0],-gRot[1]];const placed=[];let h='';for(const hb of HUBS){if(d3.geoDistance([hb.lon,hb.lat],ctr)>=Math.PI/2)continue;const p=gProj([hb.lon,hb.lat]);if(!p)continue;const sx=p[0],sy=p[1];if(placed.some(q=>Math.abs(q.x-sx)<58&&Math.abs(q.y-sy)<13))continue;placed.push({x:sx,y:sy});h+='<div class="maplbl" style="left:'+sx+'px;top:'+(sy-9)+'px">'+hb.city+'</div>';}ov.innerHTML=h;}
function renderMap(){
 [...stage.querySelectorAll('.c,.dot,.lanelab,.lanesep,.gl,.yr')].forEach(e=>e.remove());
 if(typeof d3==='undefined'){svg.removeAttribute('viewBox');svg.setAttribute('width',svg.clientWidth||900);svg.innerHTML='<text x="24" y="46" font-size="14" fill="#c0392b">Map needs d3 — it could not load (check internet). The other views work offline.</text>';document.getElementById('hint').textContent='d3 failed to load';return;}
 if(!window.__wound){window.__wound=1;for(const f of COUNTRIES.features){for(const poly of f.geometry.coordinates){for(const ring of poly){if(d3.geoArea({type:'Polygon',coordinates:[ring]})>2*Math.PI)ring.reverse();}}}}
 svg.style.pointerEvents='auto';svg.style.cursor='grab';
 const cw=scroll.clientWidth||980, ch=scroll.clientHeight||560;
 layoutW=cw;layoutH=ch;zoom=1;stage.style.transform='none';stage.style.width=cw+'px';stage.style.height=ch+'px';zoomwrap.style.width=cw+'px';zoomwrap.style.height=ch+'px';
 svg.setAttribute('width',cw);svg.setAttribute('height',ch);svg.setAttribute('viewBox','0 0 '+cw+' '+ch);svg.removeAttribute('preserveAspectRatio');
 if(!gRot){const c=dataCentroid();gRot=[-c[0],-(c[1])+5];gScale=Math.min(cw,ch)*0.62;}
 gProj=d3.geoOrthographic().rotate(gRot).scale(gScale).translate([cw/2,ch/2]).clipAngle(90);
 gPath=d3.geoPath(gProj);
 const maxc=Math.max(1,...COUNTRIES.features.map(f=>f.properties.c||0));
 let s2='<path d="'+gPath({type:'Sphere'})+'" fill="#dbe5ee" stroke="rgba(0,0,0,.25)" stroke-width="1.2"/>';
 s2+='<path d="'+(gPath(d3.geoGraticule10())||'')+'" fill="none" stroke="rgba(0,0,0,.07)" stroke-width="0.6"/>';
 for(const f of COUNTRIES.features){const d=gPath(f);if(!d)continue;const c=f.properties.c||0;const fill=c>0?'rgba(176,106,30,'+(0.12+0.6*c/maxc).toFixed(3)+')':'#e7e3db';s2+='<path d="'+d+'" fill="'+fill+'" stroke="rgba(0,0,0,.16)" stroke-width=".4"/>';}
 const ctr=[-gRot[0],-gRot[1]];const vis=(lo,la)=>d3.geoDistance([lo,la],ctr)<Math.PI/2;
 for(const c of DATA){if(c.lat==null)continue;for(const en of (c.en||[])){const b=byId[en];if(!b||b.lat==null||b.year>mapT)continue;if(Math.abs(c.lat-b.lat)<0.2&&Math.abs(c.lon-b.lon)<0.2)continue;if(!vis(c.lon,c.lat)||!vis(b.lon,b.lat))continue;const d=gPath({type:'LineString',coordinates:[[c.lon,c.lat],[b.lon,b.lat]]});if(!d)continue;s2+='<path d="'+d+'" fill="none" stroke="'+KC[b.kind]+'" stroke-opacity="'+(0.1+0.3*tfrac(b.year)).toFixed(2)+'" stroke-width="1"/>';}}
 const rsc=Math.max(0.55,Math.min(3.2,gScale/(Math.min(cw,ch)*0.62)));
 for(const c of DATA){if(c.lat==null||c.year>mapT)continue;if(!vis(c.lon,c.lat))continue;const p=gProj(llc(c));if(!p)continue;const r=(3+Math.min(4,(c.en?c.en.length:0)*0.8))*rsc;s2+='<circle class="mdot" data-id="'+enc(c.id)+'" cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="'+r.toFixed(1)+'" fill="'+KC[c.kind]+'" fill-opacity="'+(0.3+0.65*tfrac(c.year)).toFixed(2)+'" stroke="#fff" stroke-width="0.8"/>';}
 svg.innerHTML=s2;
 svg.querySelectorAll('.mdot').forEach(el=>{el.style.cursor='pointer';el.onmousemove=e=>mtip(dec(el.dataset.id),e);el.onmouseleave=()=>{document.getElementById('mtip').style.display='none';};});
 let ov=document.getElementById('maplabels');if(!ov){ov=document.createElement('div');ov.id='maplabels';ov.style.cssText='position:absolute;left:0;top:0;right:0;bottom:0;pointer-events:none;z-index:5;';stage.appendChild(ov);}ov.style.display='block';placeLabels();
 document.getElementById('hint').textContent=DATA.filter(c=>c.lat!=null&&c.year<=mapT).length+' of '+DATA.length+' tools through '+mapT+' · drag to rotate, scroll to zoom · colour=M, opacity=recency';
}
function mtip(id,e){const c=byId[id];const el=document.getElementById('mtip');el.style.borderLeftColor=KC[c.kind];el.innerHTML=`<b style="color:${KC[c.kind]}">${c.name}</b><br><span style="color:var(--mut);font-size:10.5px">${c.kind} · ${c.place} · ${c.year}</span><br><span style="font-size:11px">${c.sig||""}</span>`;el.style.display='block';el.style.left=Math.min(e.clientX+14,window.innerWidth-270)+'px';el.style.top=(e.clientY+14)+'px';}
function render(){
 syncCtrl();
 if(axis==="map"){renderMap();return;}
 svg.style.pointerEvents="none";svg.style.cursor="";{const ov=document.getElementById("maplabels");if(ov)ov.style.display="none";}
 const laneItems=layout();
 stage.style.width=layoutW+"px";stage.style.height=layoutH+"px";
 svg.setAttribute("width",layoutW);svg.setAttribute("height",layoutH);svg.setAttribute("viewBox",`0 0 ${layoutW} ${layoutH}`);
 let lit=null;if(selCard){lit=new Set([selCard]);anc(selCard,lit);desc(selCard,lit);}
 const inT=id=>selThreads.length&&threadMatch(byId[id],selThreads);
 let html="";
 lanes.forEach((l,i)=>{if(i<lanes.length-1)html+=`<div class="lanesep" style="top:${LSEP[i]}px;width:${layoutW}px"></div>`;});
 let gi=0;
 while(gi<lanes.length){const g=groupOf(lanes[gi]);let gj=gi;while(gj+1<lanes.length&&groupOf(lanes[gj+1])===g)gj++;
   if(gj>gi){const top=LTOP[lanes[gi]],bot=LBOT[lanes[gj]];
