<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Browse · Tooling Atlas</title>
<meta name="description" content="Browse the atlas — read the cards, sort the table, or map the coverage. One place, three modes.">
<meta property="og:title" content="Browse · Tooling Atlas">
<meta property="og:description" content="Browse the atlas — read the cards, sort the table, or map the coverage.">
<style>
/* Merged from deck.html + table.html + dashboard.html. The three source files reused colliding
   class names (.card = flip card vs coverage panel; .grid = auto-fill vs 2-col; .bar, .row, .n,
   .lab). The :root block is merged ONCE; every lifted component selector is scoped under the
   active mode class on #modebody (#modebody.m-cards / .m-table / .m-coverage). Header/shared
   classes (.modeseg, #filters, .chip, .count, .rail) are defined once, unscoped. */
:root{--ink:#1c1c1c;--mut:#6f6f6f;--line:rgba(0,0,0,.12);--bg:#f5f3ef;--card:#fff;
--Measure:#3266ad;--Model:#8a4fb3;--Make:#b06a1e;--Manufacture:#2f8f6b;--accent:#8a5212;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
.wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}
h1{font-size:24px;font-weight:600;margin:0 0 2px;}
.sub{color:var(--mut);font-size:14px;margin:0 0 10px;}

/* ---- PRIMARY CONTROL: the segmented mode tablist ---- */
.modeseg{display:inline-flex;border:.5px solid var(--line);border-radius:13px;overflow:hidden;margin:6px 0 12px;background:#fff;}
.modeseg button{border:0;border-right:.5px solid var(--line);background:#fff;color:var(--ink);font-family:inherit;font-weight:600;font-size:13.5px;padding:7px 18px;cursor:pointer;}
.modeseg button:last-child{border-right:0;}
.modeseg button:hover{background:#efece6;}
.modeseg button[aria-selected="true"]{background:#1c1c1c;color:#fff;}
.modeseg button[aria-selected="true"]:hover{background:#1c1c1c;}

/* ---- SHARED per-tool filter bar (Cards + Table; hidden in Coverage) ---- */
#filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:10px 0;}
#filters[hidden]{display:none;}
#filters .lab{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;}
#filters .sep{color:#b9b4ab;align-self:center;margin:0 -2px;}
.search{border:.5px solid var(--line);border-radius:14px;padding:5px 12px;font-size:13px;width:230px;background:#fff;color:var(--ink);}
select{border:.5px solid var(--line);border-radius:13px;padding:5px 10px;font-size:12.5px;background:#fff;color:var(--ink);}
.covnote{color:var(--mut);font-size:13px;margin:10px 0;font-style:italic;}

/* ---- SHARED kind chips ---- */
.chip{border:.5px solid var(--line);background:#fff;border-radius:13px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--ink);white-space:nowrap;}
.chip:hover{background:#efece6;}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}

/* ---- SHARED count line + removable pills ---- */
.count{color:var(--mut);font-size:13px;margin:8px 0 0;}
.tpill{cursor:pointer;color:#33302b;}
.tpill:hover{color:#000;}

/* ---- Cards-only lineage rail (lives in #rail, above #modebody) ---- */
.rail{display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:#fff;border:.5px solid var(--line);border-radius:12px;padding:10px 12px;margin:8px 0 18px;font-size:13px;}
.rail .rl{color:var(--mut);font-weight:600;margin-right:6px;}
.rail .node{padding:2px 8px;border-radius:10px;background:#f0ede7;cursor:pointer;}
.rail .arr{color:var(--mut);}

/* ================= CARDS MODE (from deck.html) ================= */
#modebody.m-cards .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
#modebody.m-cards .scene{perspective:1400px;}
#modebody.m-cards .card{position:relative;height:430px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.3,.7,.3,1);cursor:pointer;}
#modebody.m-cards .card.flip{transform:rotateY(180deg);}
#modebody.m-cards .face{position:absolute;inset:0;backface-visibility:hidden;background:var(--card);border:.5px solid var(--line);border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.07);padding:0;overflow:hidden;display:flex;flex-direction:column;}
#modebody.m-cards .back{transform:rotateY(180deg);}
#modebody.m-cards .stripe{height:5px;flex:none;}
#modebody.m-cards .pad{padding:15px 17px;overflow:auto;flex:1;}
#modebody.m-cards .hd{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin-bottom:3px;}
#modebody.m-cards .who{font-size:16.5px;font-weight:600;line-height:1.22;margin-bottom:2px;}
#modebody.m-cards .maker{font-size:12.5px;color:var(--mut);line-height:1.3;}
#modebody.m-cards .tool{font-size:12.5px;color:#8a8377;font-style:italic;margin-top:5px;margin-bottom:10px;}
#modebody.m-cards .txt{font-size:13.5px;line-height:1.62;}
#modebody.m-cards .txt a{color:inherit;text-decoration:underline;text-decoration-color:rgba(0,0,0,.25);text-underline-offset:2px;}
#modebody.m-cards .txt a.xcard{color:#7a5a30;text-decoration-color:rgba(122,90,48,.4);}
#modebody.m-cards .txt a.xcard:hover{background:#f4ece1;}
#modebody.m-cards .label{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-bottom:7px;}
#modebody.m-cards .foot{flex:none;border-top:.5px solid var(--line);padding:8px 17px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:#fbfaf8;}
#modebody.m-cards .tag{font-size:11px;padding:2px 8px;border-radius:9px;background:#f0ede7;color:#555;}
#modebody.m-cards .corner{position:absolute;top:9px;right:11px;font-size:10.5px;color:var(--mut);z-index:2;}
#modebody.m-cards .xlinks{margin-top:12px;border-top:.5px dashed var(--line);padding-top:10px;}
#modebody.m-cards .xlinks .h{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin-bottom:5px;}
#modebody.m-cards .xchip{display:inline-block;border:.5px solid var(--line);border-radius:10px;padding:2px 8px;font-size:12px;margin:0 5px 5px 0;cursor:pointer;background:#fff;}
#modebody.m-cards .xchip:hover{background:#efece6;}
#modebody.m-cards .flipbtn{border:.5px solid var(--line);background:#fff;border-radius:9px;padding:2px 9px;font:inherit;font-size:11px;color:var(--mut);cursor:pointer;}
#modebody.m-cards .flipbtn:hover{background:#efece6;color:var(--ink);}
#modebody.m-cards .hint{font-size:11px;color:#b9b4ab;margin-top:8px;}

/* ================= TABLE MODE (from table.html) ================= */
#modebody.m-table table{border-collapse:collapse;width:100%;background:#fff;border:.5px solid var(--line);border-radius:10px;overflow:clip;}
#modebody.m-table th,#modebody.m-table td{text-align:left;padding:7px 10px;border-bottom:.5px solid var(--line);font-size:12.5px;vertical-align:top;}
#modebody.m-table th{position:sticky;top:0;background:#efece6;cursor:pointer;user-select:none;white-space:nowrap;font-weight:600;}
#modebody.m-table th:hover{background:#e6e2db;}
#modebody.m-table tr:hover td{background:#faf9f6;}
/* table has overflow:clip for its rounded corners (clip, not hidden: hidden would make the table
   a scroll container and defeat th{position:sticky}), which clips the shared outward focus ring on
   the edge columns — inset it */
#modebody.m-table #head th:focus-visible{outline:2px solid var(--ink);outline-offset:-2px;}
#modebody.m-table .kpill{display:inline-block;padding:1px 8px;border-radius:9px;font-size:11px;}
#modebody.m-table .thr{color:var(--mut);font-size:11px;}
#modebody.m-table .sig{color:#333;max-width:380px;}
tr.flash td{animation:flashrow 1.8s ease-out;}
@keyframes flashrow{0%{background:#fff2cf}100%{background:transparent}}

/* ================= COVERAGE MODE (from dashboard.html) ================= */
#modebody.m-coverage #covsub{color:var(--mut);font-size:12px;margin:0 0 8px;}
#modebody.m-coverage .legend{display:flex;gap:10px;margin:0 0 20px;font-size:11px;color:var(--mut);flex-wrap:wrap;align-items:center;}
#modebody.m-coverage .legend .sw{display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:-1px;margin-right:4px;}
#modebody.m-coverage .legend .lsep{color:#b9b4ab;align-self:center;}
#modebody.m-coverage .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
#modebody.m-coverage .card{background:#fff;border:.5px solid var(--line);border-radius:12px;padding:16px 18px;}
#modebody.m-coverage .card h2{font-size:14px;font-weight:600;margin:0 0 12px;}
#modebody.m-coverage .row{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px;}
#modebody.m-coverage .row .lab{width:150px;text-align:right;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#modebody.m-coverage .bar{height:13px;border-radius:3px;}
#modebody.m-coverage .row .n{font-size:11px;color:var(--mut);}
#modebody.m-coverage .vlinks{margin-left:6px;white-space:nowrap;opacity:.55;transition:opacity .12s;}
#modebody.m-coverage .row:hover .vlinks,#modebody.m-coverage .row:focus-within .vlinks{opacity:1;}
#modebody.m-coverage .vlinks a{color:#5a544c;text-decoration:none;font-size:12px;padding:0 3px;border-radius:4px;}
#modebody.m-coverage .vlinks a:hover{background:#ece8e1;}
#modebody.m-coverage table{border-collapse:collapse;width:100%;font-size:12px;}
#modebody.m-coverage th,#modebody.m-coverage td{border:.5px solid var(--line);padding:5px 7px;text-align:center;}
#modebody.m-coverage th{background:#efece6;}
#modebody.m-coverage td.gap{background:#fbe7e7;color:#a83232;font-weight:600;}
#modebody.m-coverage td.era{text-align:left;color:var(--mut);background:#faf9f6;}
#modebody.m-coverage .full{grid-column:1/3;}
#modebody.m-coverage .hgroup{margin:14px 0 5px;font-size:12px;}
#modebody.m-coverage .hgroup:first-child{margin-top:0;}
#modebody.m-coverage .hgl{font-weight:600;}
#modebody.m-coverage .hgt{color:var(--mut);font-size:11px;}

@media (max-width:760px){
  .wrap{overflow-x:auto;}
  #modebody.m-table table{min-width:660px;}
  #modebody.m-coverage .grid{grid-template-columns:1fr;}
  #modebody.m-coverage .full{grid-column:auto;}
  #modebody.m-coverage .row .lab{width:104px;}
}
</style></head><body>
<script src="../ta.js"></script>
<script src="../data/cards.js"></script>
<script src="../shared.js"></script>
<div id="appnav"></div>
<div class="wrap">
  <header class="top">
    <h1>Browse</h1>
    <p class="sub" id="modesub"></p>

    <div class="modeseg" id="modeseg" role="tablist" aria-label="How to browse the tools">
      <button role="tab" id="tab-cards"    data-mode="cards"    aria-controls="modebody" aria-selected="true"  tabindex="0">Cards</button>
      <button role="tab" id="tab-table"    data-mode="table"    aria-controls="modebody" aria-selected="false" tabindex="-1">Table</button>
      <button role="tab" id="tab-coverage" data-mode="coverage" aria-controls="modebody" aria-selected="false" tabindex="-1">Coverage</button>
    </div>

    <div class="histbar" id="histbar"></div>

    <div class="bar" id="filters">
      <input class="search" id="q" aria-label="Search tools by name, person, place, or thread"
             placeholder="search name, person, place, thread…">
      <span class="lab">Kind</span><span id="kinds"></span>
      <span class="lab">Thread</span><select id="threadadd" aria-label="Add a thread filter"></select>
      <span class="lab">Goal</span><select id="goal" aria-label="Filter by essay goal"><option value="">all goals</option><option>1</option><option>2</option><option>Both</option></select>
      <button class="chip" id="reset" type="button">reset</button>
    </div>

    <p class="covnote" id="covnote" hidden>Coverage summarizes the whole history. Use Cards or Table to filter individual tools.</p>
  </header>

  <p class="count" id="count" aria-live="polite"></p>
  <div id="rail"></div>

  <div id="modebody" class="m-cards" role="tabpanel" aria-labelledby="tab-cards"></div>
</div>
<script src="browse.js"></script>
</body></html>
