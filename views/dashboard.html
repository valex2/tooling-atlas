<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard · Tooling Atlas</title>
<meta name="description" content="Coverage by kind, decade, and thread, plus the gaps still to fill.">
<meta property="og:title" content="Dashboard · Tooling Atlas">
<meta property="og:description" content="Coverage by kind, decade, and thread, plus the gaps still to fill.">
<style>
:root{--ink:#1c1c1c;--mut:#6f6f6f;--line:rgba(0,0,0,.12);--bg:#f5f3ef;--Measure:#3266ad;--Model:#8a4fb3;--Make:#b06a1e;--Manufacture:#2f8f6b;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:46px 18px 60px}
h1{font-size:21px;font-weight:600;margin:0 0 2px}.sub{color:var(--mut);margin:0 0 4px}
.meta{color:var(--mut);font-size:12px;margin:0 0 20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:#fff;border:.5px solid var(--line);border-radius:12px;padding:16px 18px}
.card h2{font-size:14px;font-weight:600;margin:0 0 12px}
.row{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px}
.row .lab{width:150px;text-align:right;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar{height:13px;border-radius:3px}
.row .n{font-size:11px;color:var(--mut)}
.vlinks{margin-left:6px;white-space:nowrap;opacity:.55;transition:opacity .12s}
.row:hover .vlinks,.row:focus-within .vlinks{opacity:1}
.vlinks a{color:#5a544c;text-decoration:none;font-size:12px;padding:0 3px;border-radius:4px}
.vlinks a:hover{background:#ece8e1}
table{border-collapse:collapse;width:100%;font-size:12px}
th,td{border:.5px solid var(--line);padding:5px 7px;text-align:center}th{background:#efece6}
td.gap{background:#fbe7e7;color:#a83232;font-weight:600}td.era{text-align:left;color:var(--mut);background:#faf9f6}
.full{grid-column:1/3}
.hgroup{margin:14px 0 5px;font-size:12px}.hgroup:first-child{margin-top:0}
.hgl{font-weight:600}.hgt{color:var(--mut);font-size:11px}
@media (max-width:760px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.row .lab{width:104px}}
</style></head><body>
<div class="wrap">
<h1>Dashboard</h1>
<p class="sub">What the atlas covers, and what it is still missing.</p>
<p class="meta" id="sub"></p>
<div class="histbar" id="histbar"></div>
<div class="grid">
 <div class="card"><h2>By kind</h2><div id="bykind"></div></div>
 <div class="card"><h2>By decade</h2><div id="bydecade"></div></div>
 <div class="card full"><h2>Threads by size</h2><div id="bythread"></div></div>
 <div class="card full"><h2>Coverage — era × kind <span style="font-weight:400;color:var(--mut)">(red = gap, nothing written yet)</span></h2><div id="matrix"></div></div>
</div></div>
<script src="../ta.js"></script><script src="../data/cards.js"></script><script src="../shared.js"></script>
<script>
const KC=window.KCOL;                 // single source of truth (shared.js)
const KINDS=window.KINDS;
const ERAS=window.ERAS;
// legend (one-time) — the four jobs as an ordered swatch row.
// A7: faint "→" between the swatches so the four jobs read as an ORDER (see it → build a
// billion), not four peer categories.
document.getElementById("sub").insertAdjacentHTML("afterend",'<div style="display:flex;gap:10px;margin:-12px 0 20px;font-size:11px;color:var(--mut)">'+KINDS.map(k=>`<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${KC[k]};vertical-align:-1px;margin-right:4px"></span>${k}</span>`).join('<span aria-hidden="true" style="color:#b9b4ab;align-self:center">→</span>')+'</div>');
function bars(el,data,max,colorfn,linkfn){el.innerHTML=data.map(d=>{const inner=`<span class="lab">${d.k}</span><div class="bar" style="width:${Math.max(2,d.v/max*260)}px;background:${colorfn(d.k)}"></div><span class="n">${d.v}</span>`;return linkfn?`<a class="row" href="${linkfn(d.k)}" style="text-decoration:none;color:inherit">${inner}</a>`:`<div class="row">${inner}</div>`;}).join("");}
// stacked (kind-colored) horizontal bar
function segBar(perKind,total,max,wpx){const w=Math.max(2,total/max*wpx);const segs=KINDS.filter(k=>perKind[k]).map(k=>`<div title="${k}: ${perKind[k]}" style="flex:${perKind[k]} 0 0;background:${KC[k]}"></div>`).join("");return `<div class="bar" style="width:${w}px;display:flex;overflow:hidden">${segs}</div>`;}
function perKind(list){const o={};list.forEach(c=>{o[c.kind]=(o[c.kind]||0)+1;});return o;}
// History = single-select FILTER (hist=): scopes every panel to one essay field, and the
// "Threads by size" panel groups its threads under the four histories. Honoured on load.
function render(){
 const hist=getHistory();
 const scope=hist?CARDS.filter(c=>historyMatch(c,hist)):CARDS;
 const threads=[...new Set(scope.flatMap(c=>c.threads))];
 document.getElementById("sub").textContent=scope.length+" tools · "+threads.length+" threads · "+new Set(scope.map(c=>c.country).filter(Boolean)).size+" countries"+(hist?" · "+historyByKey(hist).label:"");
 // by kind
 const kc=KINDS.map(k=>({k,v:scope.filter(c=>c.kind===k).length}));
 bars(document.getElementById("bykind"),kc,Math.max(1,...kc.map(d=>d.v)),k=>KC[k]||"#999",k=>"table.html#kind="+encodeURIComponent(k));
 // by decade (stacked by kind)
 const decCards={};scope.forEach(c=>{if(!c.year)return;const d=Math.floor(c.year/10)*10;(decCards[d]=decCards[d]||[]).push(c);});
 const decs=Object.keys(decCards).map(Number).sort((a,b)=>a-b);
 const dmax=Math.max(1,...decs.map(d=>decCards[d].length));
 document.getElementById("bydecade").innerHTML=decs.map(d=>{const n=decCards[d].length;return `<a class="row" href="table.html#decade=${d}" style="text-decoration:none;color:inherit"><span class="lab" style="width:46px">${d}s</span>${segBar(perKind(decCards[d]),n,dmax,240)}<span class="n">${n}</span></a>`;}).join("");
 // threads by size (stacked by kind), grouped under the four (+floor/other) histories
 const groups=hist?[historyByKey(hist)]:window.HISTORIES;
 const tmax=Math.max(1,...threads.map(t=>scope.filter(c=>c.threads.includes(t)).length));
 document.getElementById("bythread").innerHTML=groups.map(g=>{
  const rows=g.threads.map(t=>({k:t,cards:scope.filter(c=>c.threads.includes(t))})).sort((a,b)=>b.cards.length-a.cards.length);
  const head=`<div class="hgroup"><span class="hgl">${g.label}</span> <span class="hgt">${g.tag}</span></div>`;
  return head+rows.map(d=>{const n=d.cards.length,e=encodeURIComponent(d.k);
   const links=`<span class="vlinks"><a href="map.html#thread=${e}" title="Trace on globe">⊙ globe</a><a href="atlas.html#thread=${e}" title="See its lane on the timeline">▤ timeline</a><a href="table.html#thread=${e}" title="List in the table">▦ table</a></span>`;
   return `<div class="row"><a href="table.html#thread=${e}" class="lab" style="text-decoration:none;color:var(--mut)">${d.k}</a>${segBar(perKind(d.cards),n,tmax,260)}<span class="n">${n}</span>${links}</div>`;}).join("");
 }).join("");
 // era x kind matrix
 let h='<table><tr><th>Era</th>'+KINDS.map(k=>`<th><a href="table.html#kind=${encodeURIComponent(k)}" style="color:${KC[k]};text-decoration:none">${k}</a></th>`).join("")+'<th>Σ</th></tr>';
 for(const [name,a,b] of ERAS){let rsum=0;let cells="";for(const k of KINDS){const n=scope.filter(c=>c.kind===k&&c.year>=a&&c.year<b).length;rsum+=n;cells+=`<td class="${n===0?'gap':''}">${n||"·"}</td>`;}h+=`<tr><td class="era">${name} <span style="color:#bbb">${a}–${b-1}</span></td>${cells}<td>${rsum}</td></tr>`;}
 h+='</table>';document.getElementById("matrix").innerHTML=h;
 historyBar(document.getElementById("histbar"),render);
}
render();
// C1: a tool focused on another view arrives at #card=<id> — open its detail panel.
try{const _f=(getState().card||"");if(_f&&window.__byId&&window.__byId[_f])showDetail(window.__byId[_f]);}catch(e){}
</script>
<div id="appnav"></div>
</body></html>
