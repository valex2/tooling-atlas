<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deck · Tooling Atlas</title>
<meta name="description" content="Flip cards — the moment on the front, the aftermath on the back.">
<meta property="og:title" content="Deck · Tooling Atlas">
<meta property="og:description" content="Flip cards — the moment on the front, the aftermath on the back.">
<style>
:root{--ink:#1c1c1c;--mut:#6f6f6f;--line:rgba(0,0,0,.12);--bg:#f5f3ef;--card:#fff;
--Measure:#3266ad;--Model:#8a4fb3;--Make:#b06a1e;--Manufacture:#2f8f6b;--accent:#8a5212;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
.wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}
h1{font-size:24px;font-weight:600;margin:0 0 2px;}
.sub{color:var(--mut);font-size:14px;margin:0 0 18px;}
.bar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:10px 0;}
.bar .lab{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-right:4px;}
.chip{border:0.5px solid var(--line);background:#fff;border-radius:14px;padding:4px 11px;font-size:13px;cursor:pointer;color:var(--ink);white-space:nowrap;}
.chip:hover{background:#efece6;}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.kchip.on{color:#fff;border-color:transparent;}
.rail{display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:#fff;border:0.5px solid var(--line);border-radius:12px;padding:10px 12px;margin:8px 0 18px;font-size:13px;}
.rail .rl{color:var(--mut);font-weight:600;margin-right:6px;}
.rail .node{padding:2px 8px;border-radius:10px;background:#f0ede7;cursor:pointer;}
.rail .arr{color:var(--mut);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.scene{perspective:1400px;}
.card{position:relative;height:430px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.3,.7,.3,1);cursor:pointer;}
.card.flip{transform:rotateY(180deg);}
.face{position:absolute;inset:0;backface-visibility:hidden;background:var(--card);border:0.5px solid var(--line);border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.07);padding:0;overflow:hidden;display:flex;flex-direction:column;}
.back{transform:rotateY(180deg);}
.stripe{height:5px;flex:none;}
.pad{padding:15px 17px;overflow:auto;flex:1;}
.hd{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin-bottom:3px;}
.who{font-size:16.5px;font-weight:600;line-height:1.22;margin-bottom:2px;}
.maker{font-size:12.5px;color:var(--mut);line-height:1.3;}
.tool{font-size:12.5px;color:#8a8377;font-style:italic;margin-top:5px;margin-bottom:10px;}
.txt{font-size:13.5px;line-height:1.62;}
.txt a{color:inherit;text-decoration:underline;text-decoration-color:rgba(0,0,0,.25);text-underline-offset:2px;}
/* .xcard = a link to another card in this deck (from a [[wikilink]] in the vault).
   Tinted to read as internal navigation, unlike the plain external links above. */
.txt a.xcard{color:#7a5a30;text-decoration-color:rgba(122,90,48,.4);}
.txt a.xcard:hover{background:#f4ece1;}
.label{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-bottom:7px;}
.foot{flex:none;border-top:0.5px solid var(--line);padding:8px 17px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:#fbfaf8;}
.tag{font-size:11px;padding:2px 8px;border-radius:9px;background:#f0ede7;color:#555;}
.corner{position:absolute;top:9px;right:11px;font-size:10.5px;color:var(--mut);z-index:2;}
.xlinks{margin-top:12px;border-top:0.5px dashed var(--line);padding-top:10px;}
.xlinks .h{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin-bottom:5px;}
.xchip{display:inline-block;border:0.5px solid var(--line);border-radius:10px;padding:2px 8px;font-size:12px;margin:0 5px 5px 0;cursor:pointer;background:#fff;}
.xchip:hover{background:#efece6;}
.flipbtn{border:0.5px solid var(--line);background:#fff;border-radius:9px;padding:2px 9px;font:inherit;font-size:11px;color:var(--mut);cursor:pointer;}
.flipbtn:hover{background:#efece6;color:var(--ink);}
.count{color:var(--mut);font-size:13px;margin:6px 0 0;}
.hint{font-size:11px;color:#b9b4ab;margin-top:8px;}
</style></head><body>
<script src="../ta.js"></script>
<script src="../data/cards.js"></script>
<script src="../shared.js"></script>
<div id="appnav"></div><div class="wrap">
<h1>Deck</h1>
<p class="sub">Click a card to flip it — the moment on the front, the aftermath on the back.</p>
<div class="bar"><span class="lab">Kind</span><span id="kinds"></span></div>
<div class="bar"><span class="lab">Thread</span><span id="threads"></span></div>
<div id="rail"></div>
<p class="count" id="count"></p>
<div class="grid" id="grid"></div>
<p class="hint">Generated from the live card notes. Curator notes are intentionally omitted — the deck shows only what a reader sees.</p>
</div>
<script>
const DATA=window.CARDS||[];
const KINDS=window.KINDS;
const KC={Measure:"var(--Measure)",Model:"var(--Model)",Make:"var(--Make)",Manufacture:"var(--Manufacture)"};
const KINK=window.KINK, KGLY=window.KGLY;   // contrast-safe ink + non-colour glyph (shared.js)
const allThreads=[...new Set(DATA.flatMap(c=>c.threads))].sort();
let fKind=null,fThread=null;
// B2: land on the same thread the visitor was tracing on Globe/Timeline (shared #thread=).
try{const _t=getThreads()[0];if(_t&&allThreads.includes(_t))fThread=_t;}catch(e){}
const byName=Object.fromEntries(DATA.map(c=>[c.name,c]));
function chips(){
 document.getElementById("kinds").innerHTML=KINDS.map(k=>`<button class="chip kchip" data-k="${k}" style="${fKind===k?'background:'+KC[k]:''}">${k}</button>`).join("")+`<button class="chip" data-k="">All</button>`;
 document.getElementById("threads").innerHTML=allThreads.map(t=>`<button class="chip ${fThread===t?'on':''}" data-t="${t}">${t}</button>`).join("")+`<button class="chip" data-t="">All</button>`;
 document.querySelectorAll("[data-k]").forEach(b=>b.onclick=()=>{fKind=b.dataset.k||null;render();});
 document.querySelectorAll("[data-t]").forEach(b=>b.onclick=()=>{fThread=b.dataset.t||null;try{setThreads(fThread?[fThread]:[]);}catch(e){}render();});
 document.querySelectorAll(".kchip").forEach(b=>{if(b.dataset.k===fKind)b.classList.add("on");});
}
function rail(){
 const r=document.getElementById("rail");
 if(!fThread){r.innerHTML="";return;}
 const ms=DATA.filter(c=>c.threads.includes(fThread)).sort((a,b)=>a.year-b.year);
 r.className="rail";
 r.innerHTML=`<span class="rl">${fThread} lineage</span>`+ms.map((c,i)=>`${i?'<span class="arr">→</span>':''}<span class="node" data-go="${c.name}">${c.year} ${c.name}</span>`).join(" ");
 r.querySelectorAll("[data-go]").forEach(n=>n.onclick=()=>scrollTo2(n.dataset.go));
}
function visible(){
 let v=DATA.slice();
 if(fKind)v=v.filter(c=>c.kind===fKind);
 if(fThread)v=v.filter(c=>c.threads.includes(fThread));
 v.sort((a,b)=>a.year-b.year);
 return v;
}
function cardHTML(c){
 const others=c.threads.map(t=>`<span class="xchip" data-t="${t}">${t}</span>`).join("");
 
 const marks=[];if(c.threads.length>1)marks.push(c.threads.length+" threads");
 return `<div class="scene"><div class="card" id="card-${cssid(c.name)}">
  <div class="face front"><div class="stripe" style="background:${KC[c.kind]}"></div>
    <div class="corner">${marks.join(" · ")}</div>
    <div class="pad"><div class="hd">${c.kind} · ${c.place} · ${decadeLabel(c.year)}</div>
      <div class="who">${c.name}</div><div class="maker">${c.person}</div><div class="tool">${c.tool}</div>
      <div class="txt">${c.front}</div></div>
    <div class="foot"><span class="tag" style="background:${KC[c.kind]}1f;color:${KINK[c.kind]}"><span aria-hidden="true">${KGLY[c.kind]}</span> ${c.kind}</span>
      <span class="tag">${c.year}</span>
      <button class="flipbtn" type="button" style="margin-left:auto">Show aftermath ⟲</button></div>
  </div>
  <div class="face back" inert><div class="stripe" style="background:${KC[c.kind]}"></div>
    <div class="pad"><div class="label">Aftermath</div><div class="txt">${c.back}</div>
      <div class="xlinks"><div class="h">Why it matters</div><div style="font-size:12.5px;line-height:1.5;margin-bottom:4px">${c.sig||""}</div></div><div class="xlinks"><div class="h">Cross-links</div>${others}${location.protocol==='file:'?('<div style="margin-top:8px"><a href="obsidian://open?vault=Obsidian%20Vault&file='+encodeURIComponent('Tooling Card - '+c.name.replace(/\//g,'-'))+'" style="color:#9a6a3a;font-size:11px;text-decoration:none">Open note in Obsidian ↗</a></div>'):''}</div></div>
    <div class="foot"><span class="tag">Goal ${c.goal}</span><span class="tag">${c.conf}</span>
      <button class="flipbtn" type="button" style="margin-left:auto">Show the moment ⟲</button></div>
  </div></div></div>`;
}
function cssid(s){return s.replace(/[^a-z0-9]/gi,"_");}
// Front-header date: a clean derived decade from c.year, so the grid reads uniformly
// ("1870s", "1200s", "550s") instead of the free-form c.era ("6TH CENTURY"/"1200S"/
// "2020-2022"). Display only — c.era data is left intact.
function decadeLabel(y){return y?(Math.floor(y/10)*10)+"s":"";}
// Single entry point for flip state. `inert` (not aria-hidden) on the turned-away
// face: backface-visibility hides it visually only, and aria-hidden over a subtree
// containing focusable things — every back face has an obsidian:// link, and the
// prose carries a.xcard wikilinks — is the aria-hidden-focus trap, where Tab lands
// on a control the screen reader swears does not exist. inert removes it from the
// a11y tree AND from the tab order, which is the actual intent.
// The card itself is deliberately NOT a button: role="button" is
// children-presentational, so making the card one collapsed all its prose and links
// into a single label and left the deck's content unreadable in BOTH states.
// No aria-pressed: these are not toggle buttons. Only ONE is reachable at a time (the
// other sits on the inert face), and each names the action it performs — "Show aftermath"
// / "Show the moment". A pressed-state on top of a changing label double-encodes the same
// fact, and the markup shipped the two buttons with CONTRADICTORY initial values anyway.
function setFlip(el,on){
 el.classList.toggle("flip",on);
 el.querySelector(".front").inert=on;
 el.querySelector(".back").inert=!on;
}
function render(){
 chips();rail();
 const v=visible();
 document.getElementById("count").textContent=`${v.length} card${v.length!=1?"s":""}${fThread?" in this lineage, oldest first":""}${fKind?" · "+fKind:""}`;
 document.getElementById("grid").innerHTML=v.map(cardHTML).join("");
 document.querySelectorAll(".card").forEach(el=>{el.onclick=e=>{
   if(e.target.closest("a"))return;
   const g=e.target.closest("[data-go]");if(g){e.stopPropagation();const t=byName[g.dataset.go];if(t){fThread=null;fKind=null;render();setTimeout(()=>scrollTo2(g.dataset.go,true),60);}return;}
   const tc=e.target.closest(".xchip");if(tc){e.stopPropagation();fThread=tc.dataset.t;fKind=null;render();return;}
   setFlip(el,!el.classList.contains("flip"));
 };
 // No kbd() on the card: it would set role="button" (see setFlip) and its blanket
 // preventDefault on Enter also stopped Enter from following the a.xcard wikilinks.
 // The .flipbtn buttons carry keyboard operation properly instead.
 el.querySelectorAll(".flipbtn").forEach(b=>b.onclick=e=>{
   e.stopPropagation();setFlip(el,!el.classList.contains("flip"));
   // keep focus usable: move to the newly-shown face's flip button
   const vis=el.querySelector((el.classList.contains("flip")?".back":".front")+" .flipbtn");
   if(vis)vis.focus();
 });});
}
function scrollTo2(name,flip){const el=document.getElementById("card-"+cssid(name));if(!el)return;el.scrollIntoView({behavior:"smooth",block:"center"});if(flip)setFlip(el,true);el.parentElement.style.outline="2px solid var(--accent)";setTimeout(()=>el.parentElement.style.outline="",1600);}
render();

window.addEventListener("message",function(e){if(e.data&&e.data.type==="focuscard")try{scrollTo2(e.data.id,true);}catch(x){}});
(function(){
 // clear=true only on hashchange (an in-page .xcard click): if the target card is
 // filtered out of the current view, drop the filters first, matching what the
 // [data-go] chips do — otherwise the link would silently land on nothing.
 // On the initial load the thread filter has already been seeded from #thread=X (see
 // the fThread init above), so we pass false to keep it rather than clearing it.
 // C1: the shared focus lives at #card= as a card id — resolve it through __byId
 // (id) with a byName (name) fallback, then flip+scroll so a tool focused on another
 // view opens here.
 function fh(clear){var m=(location.hash||"").match(/card=([^&]+)/);if(!m)return;
  var key=decodeURIComponent(m[1]);
  var c=(window.__byId&&window.__byId[key])||byName[key];if(!c)return;
  var nm=c.name;
  if(clear&&!document.getElementById("card-"+cssid(nm))){fThread=null;fKind=null;render();}
  setTimeout(function(){try{scrollTo2(nm,true);}catch(x){}},80);}
 window.addEventListener("hashchange",function(){fh(true);});fh(false);})();
</script></body></html>
