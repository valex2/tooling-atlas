<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Globe · Tooling Atlas</title>
<meta name="description" content="Globe — where each tool was invented, and how each fed a later one somewhere else.">
<meta property="og:title" content="Globe · Tooling Atlas">
<meta property="og:description" content="Globe — where each tool was invented, and how each fed a later one somewhere else.">
<style>
:root{--ink:#1c1c1c;--mut:#6f6f6f;--line:rgba(0,0,0,.12);--bg:#f5f3ef;--card:#fff;
--Measure:#3266ad;--Model:#8a4fb3;--Make:#b06a1e;--Manufacture:#2f8f6b;}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
.top{padding:12px 16px 6px}h1{font-size:18px;font-weight:600;margin:0 0 4px}
.bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:12px}
.btn{border:.5px solid var(--line);background:#fff;border-radius:13px;padding:4px 11px;cursor:pointer;color:var(--ink);font-size:12px}
.btn:hover{background:#eceae4}.btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
input[type=range]{flex:1;min-width:160px;accent-color:var(--ink)}
.ylab{font-weight:600;font-size:15px;min-width:48px}
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11.5px;color:var(--mut);margin-top:4px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:50%;vertical-align:-1px;margin-right:4px}
#wrap{position:absolute;inset:96px 292px 0 0}
#chips{position:absolute;top:96px;right:0;width:292px;bottom:0;overflow:auto;border-left:.5px solid var(--line);background:#fbfaf8;padding:8px 10px}
svg{display:block;width:100%;height:100%;cursor:grab;touch-action:none}
svg.drag{cursor:grabbing}
#g .dot,#g .cty{cursor:pointer}
.tip{position:fixed;pointer-events:none;background:var(--card);border:.5px solid var(--line);border-left:4px solid #999;border-radius:8px;padding:8px 10px;font-size:12px;max-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.16);display:none;z-index:50}
.tip .t{font-weight:600}.tip .m{color:var(--mut);font-size:10.5px;margin:2px 0 4px}.tip .s{font-size:11px;line-height:1.4}
.hint{position:absolute;left:16px;bottom:8px;font-size:11px;color:#b9b4ab}
/* phone: the 292px era rail can't share a narrow screen with the globe — stack them */
@media (max-width:760px){
 html,body{height:auto}
 #wrap{position:relative;inset:auto;width:100%;height:62vh}
 #chips{position:relative;top:auto;right:auto;width:auto;bottom:auto;height:auto;max-height:46vh;
   border-left:0;border-top:.5px solid var(--line)}
 .hint{position:static;padding:4px 16px}
}
</style></head><body>
<div id="appnav"></div>
<div class="top">
<h1>Globe</h1>
<div class="bar">
  <button class="btn" id="play">▶ play</button>
  <span class="ylab" id="ylab">2030</span>
  <input type="range" id="yr" min="0" max="1000" value="1000" aria-label="Year">
  <button class="btn" id="reset">reset view</button><input id="msearch" aria-label="Find a tool" placeholder="find a tool…" style="border:.5px solid var(--line);border-radius:13px;padding:4px 11px;font-size:12px;width:150px"><span style="position:relative;display:inline-block"><button class="btn" id="threadbtn" aria-expanded="false" aria-controls="threadpanel">threads ▾</button><div id="threadpanel" style="display:none;position:absolute;top:34px;right:0;z-index:60;background:#fff;border:.5px solid var(--line);border-radius:10px;box-shadow:0 8px 26px rgba(0,0,0,.16);width:236px;max-height:360px;overflow:auto;padding:6px"></div></span>
</div>
<!-- glyphs are filled from KGLY in shared.js by map.js: kind must survive colour-blindness and B/W printing -->
<div class="legend"><span><i style="background:var(--Measure)"></i><span class="gly" data-k="Measure" aria-hidden="true"></span> Measure</span><span><i style="background:var(--Model)"></i><span class="gly" data-k="Model" aria-hidden="true"></span> Model</span><span><i style="background:var(--Make)"></i><span class="gly" data-k="Make" aria-hidden="true"></span> Make</span><span><i style="background:var(--Manufacture)"></i><span class="gly" data-k="Manufacture" aria-hidden="true"></span> Manufacture</span><span>drag to spin · scroll to zoom · colour = M, opacity = recency · pick threads to trace their migration over time (press play)</span></div>
</div>
<div id="wrap"><svg id="g" role="img" aria-label="Globe of where each tool was invented and how each fed a later one"></svg></div><div id="chips"></div>
<div class="tip" id="tip"></div>
<div class="hint" id="hint"></div>
<script src="../data/cards.js"></script>
<script src="../data/countries.js"></script>
<script src="../shared.js"></script>
<script src="map.js"></script>
</body></html>
