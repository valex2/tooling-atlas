<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tree · Tooling Atlas</title>
<meta name="description" content="The genealogy of tools: which built on which, branching through time.">
<meta property="og:title" content="Tree · Tooling Atlas">
<meta property="og:description" content="The genealogy of tools: which built on which, branching through time.">
<style>
:root{--ink:#1c1c1c;--mut:#6f6f6f;--line:rgba(0,0,0,.12);--bg:#f5f3ef;--card:#fff;
--Measure:#3266ad;--Model:#8a4fb3;--Make:#b06a1e;--Manufacture:#2f8f6b;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.top{padding:12px 16px 6px}h1{font-size:18px;font-weight:600;margin:0 0 2px}
.sub{color:var(--mut);font-size:12.5px;margin:0 0 6px;max-width:760px}
.legend .sep{color:#b9b4ab}
.bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:12px}
input.search{border:.5px solid var(--line);border-radius:14px;padding:4px 11px;font-size:12.5px;width:200px;background:#fff;color:var(--ink)}
.btn{border:.5px solid var(--line);background:#fff;border-radius:13px;padding:4px 10px;cursor:pointer;font-size:12px}
.legend{display:flex;gap:12px;font-size:11.5px;color:var(--mut);margin-top:4px;flex-wrap:wrap}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px}
.scroll{overflow:auto;border-top:.5px solid var(--line);height:calc(100vh - 96px);background:#fcfbf9}
#stage{position:relative}
#edges{position:absolute;left:0;top:0;pointer-events:none;z-index:1}
.lanelab{position:absolute;left:6px;font-size:10.5px;color:var(--mut);font-weight:500;transform:translateY(-50%);width:150px;z-index:3}
.gl{position:absolute;border-left:1px solid rgba(0,0,0,.045)}.gl.maj{border-left:1px solid rgba(0,0,0,.10)}
.yr{position:absolute;font-size:9.5px;top:8px}
.c{position:absolute;background:#fff;border:.5px solid var(--line);border-left:3px solid #999;border-radius:6px;padding:4px 7px;cursor:pointer;z-index:2;width:124px;overflow:hidden}
.c:hover{box-shadow:0 4px 14px rgba(0,0,0,.14);z-index:6}
.c .ti{font-size:10.5px;font-weight:500;line-height:1.2}.c .yt{font-size:9px;color:#aaa}
.c.dim{opacity:.12}.c.sel{outline:2px solid var(--ink);outline-offset:1px}.c.hl{outline:1.5px solid var(--ink);outline-offset:1px}
.tip{position:fixed;pointer-events:none;background:#fff;border:.5px solid var(--line);border-left:4px solid #999;border-radius:8px;padding:8px 10px;font-size:12px;max-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.16);display:none;z-index:50}
.tip .t{font-weight:600}.tip .m{color:var(--mut);font-size:10.5px;margin:2px 0 4px}.tip .s{font-size:11px;line-height:1.4}
.hint{font-size:11px;color:#b9b4ab;padding:5px 16px}
#stage .lanelab{background:rgba(252,251,249,.93);z-index:7;padding:1px 6px 1px 3px;border-radius:0 5px 5px 0}
</style></head><body>
<div id="appnav"></div>
<div class="top"><h1>Tree</h1>
<p class="sub">Ideas build on ideas and copy freely across borders. Only the making stays rooted — that is what the other views track.</p>
<div class="bar"><input class="search" id="q" aria-label="Search a tool by name" placeholder="search a tool…"><button class="btn" id="reset">reset</button>
<span style="color:var(--mut)">click a tool for its full ancestry &amp; descendants</span></div>
<div class="legend"><span><i style="background:var(--Measure)"></i><span class="gly" data-k="Measure" aria-hidden="true"></span> Measure</span><span class="sep" aria-hidden="true">→</span><span><i style="background:var(--Model)"></i><span class="gly" data-k="Model" aria-hidden="true"></span> Model</span><span class="sep" aria-hidden="true">→</span><span><i style="background:var(--Make)"></i><span class="gly" data-k="Make" aria-hidden="true"></span> Make</span><span class="sep" aria-hidden="true">→</span><span><i style="background:var(--Manufacture)"></i><span class="gly" data-k="Manufacture" aria-hidden="true"></span> Manufacture</span><span>lines = builds-on → enables</span></div>
</div>
<div class="scroll" id="scroll" tabindex="0" role="region" aria-label="Tree canvas — scroll or use the arrow keys to pan"><div id="stage"><svg id="edges" aria-hidden="true"></svg></div></div>
<div class="tip" id="tip"></div>
<script src="../ta.js"></script>
<script src="../data/cards.js"></script>
<script src="../shared.js"></script>
<script src="tree.js"></script>
</body></html>
